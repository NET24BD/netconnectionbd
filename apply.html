<!DOCTYPE html>
<html lang="en">

<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<title>Net Connection BD - Apply</title>

<link href="https://fonts.googleapis.com/css2?family=Poppins:wght@300;400;500;600;700&display=swap" rel="stylesheet">

<style>

*{
  margin:0;
  padding:0;
  box-sizing:border-box;
  font-family:'Poppins',sans-serif;
}

body{
  background:#050816;
  color:white;
}

.container{
  width:90%;
  max-width:1100px;
  margin:auto;
}

.card{
  background:#08101f;
  border-radius:20px;
  padding:30px;
  margin-top:40px;
  border:1px solid rgba(0,229,255,0.15);
}

.input-group{
  margin-bottom:20px;
  padding:12px;
  border-radius:10px;
  transition:0.3s;
}

label{
  display:block;
  margin-bottom:8px;
  color:#d1d5db;
}

input,select{
  width:100%;
  padding:14px;
  border-radius:10px;
  border:1px solid rgba(255,255,255,0.1);
  background:#050816;
  color:white;
}

/* focus glow */
.input-group.focused{
  box-shadow:0 0 18px rgba(0,229,255,0.6);
  background:rgba(0,229,255,0.1);
  transform:scale(1.02);
}

/* error highlight */
.input-group.error input{
  border:1px solid red;
}

.row{
  display:grid;
  grid-template-columns:1fr 1fr;
  gap:20px;
}

.promo-box{
  display:flex;
  gap:10px;
}

.promo-btn{
  background:#005eff;
  color:white;
  border:none;
  padding:14px 20px;
  border-radius:10px;
  cursor:pointer;
}

#promoMessage{
  margin-top:8px;
  font-weight:600;
}

.summary-box{
  margin-top:20px;
  padding:20px;
  border-radius:15px;
  border:1px solid rgba(0,229,255,0.15);
}

.summary-row{
  display:flex;
  justify-content:space-between;
  margin:12px 0;
}

.service{ color:#00e5ff; }
.discount{ color:#ff4d4d; }

.total{
  font-size:22px;
  font-weight:700;
  color:#00e5ff;
}

.submit-btn{
  width:100%;
  padding:16px;
  margin-top:20px;
  border:none;
  border-radius:10px;
  background:#005eff;
  color:white;
  font-size:18px;
  cursor:pointer;
}

.submit-btn:hover{
  background:#0077ff;
}

</style>
</head>

<body>

<div class="container">

<div class="card">

<div class="row">

<div class="input-group">
<label>Name</label>
<input type="text" id="name">
</div>

<div class="input-group">
<label>Phone</label>
<input type="text" id="phone">
</div>

</div>

<div class="input-group">
<label>Email</label>
<input type="email" id="email">
</div>

<div class="input-group">
<label>Address</label>
<input type="text" id="address">
</div>

<div class="input-group">
<label>Location</label>
<input type="text" id="map">
</div>

<div class="input-group">
<label>Package</label>
<select id="packageSelect">
  <option value="500">20 Mbps - 500</option>
  <option value="600" selected>30 Mbps - 600</option>
  <option value="800">40 Mbps - 800</option>
</select>
</div>

<div class="input-group">
<label>Promo Code</label>
<div class="promo-box">
  <input type="text" id="promoCode">
  <button class="promo-btn" type="button" onclick="applyPromo()">Apply</button>
</div>
<div id="promoMessage"></div>
</div>

<div class="summary-box">

<div class="summary-row">
<span>Package</span>
<span id="packagePrice">0</span>
</div>

<div class="summary-row service">
<span>Service</span>
<span id="serviceCharge">350</span>
</div>

<div class="summary-row discount">
<span>Discount</span>
<span id="discountAmount">0</span>
</div>

<div class="summary-row total">
<span>Total</span>
<span id="totalPayable">0</span>
</div>

</div>

<button class="submit-btn" onclick="submitForm()">
Submit Application
</button>

</div>

</div>

<script>

const SCRIPT_URL = "https://script.google.com/macros/s/AKfycbznQfF_tx4d9dGU_aJWEsWSKmPouHlhM8B5nBnYhLQaVNmo3u0Jx_uXtBKlWHP6Ij0/exec";

let price = 600;
let serviceCharge = 350;
let discount = 0;

const validCodes = {
  "SAVE20": 160,
  "OFF50": 50,
  "OFF30": 200
};

/* FOCUS EFFECT */
document.querySelectorAll("input, select").forEach(el=>{
  el.addEventListener("focus", ()=>{
    el.closest(".input-group").classList.add("focused");
  });

  el.addEventListener("blur", ()=>{
    el.closest(".input-group").classList.remove("focused");
  });
});

/* PACKAGE */
document.getElementById("packageSelect").addEventListener("change", function(){
  price = parseInt(this.value);
  updateUI();
});

/* PROMO */
function applyPromo(){

  let code = document.getElementById("promoCode").value.trim().toUpperCase();
  let msg = document.getElementById("promoMessage");

  if(validCodes[code]){
    discount = validCodes[code];
    msg.innerText = "✅ Valid Code";
    msg.style.color = "#00ff88";
  }
  else{
    discount = 0;
    msg.innerText = "❌ Invalid Code";
    msg.style.color = "red";
  }

  updateUI();
}

/* UPDATE */
function updateUI(){

  let total = price + serviceCharge - discount;

  document.getElementById("packagePrice").innerText = price;
  document.getElementById("serviceCharge").innerText = serviceCharge;
  document.getElementById("discountAmount").innerText = discount;
  document.getElementById("totalPayable").innerText = total;
}

/* SUBMIT WITH VALIDATION */
function submitForm(){

  let fields = ["name","phone","email","address","map"];
  let valid = true;

  fields.forEach(id=>{
    let input = document.getElementById(id);
    let group = input.closest(".input-group");

    if(input.value.trim() === ""){
      group.classList.add("error");
      valid = false;
    } else {
      group.classList.remove("error");
    }
  });

  if(!valid){
    alert("❌ Please fill all required fields!");
    return;
  }

  const data = {
    name: name.value,
    phone: phone.value,
    email: email.value,
    address: address.value,
    map: map.value,
    package: packageSelect.options[packageSelect.selectedIndex].text,
    service: serviceCharge,
    discount: discount,
    promo: promoCode.value,
    total: price + serviceCharge - discount
  };

  fetch(SCRIPT_URL,{
    method:"POST",
    headers:{"Content-Type":"text/plain;charset=utf-8"},
    body:JSON.stringify(data)
  })
  .then(r=>r.text())
  .then(()=>{
    alert("✅ Submitted Successfully!");
  })
  .catch(()=>{
    alert("❌ Error Occurred!");
  });

}

updateUI();

</script>

</body>
</html>
