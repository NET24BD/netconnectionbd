<!DOCTYPE html>
<html lang="en">

<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<title>Net Connection BD - Apply</title>

<link href="https://fonts.googleapis.com/css2?family=Poppins:wght@300;400;500;600;700&display=swap" rel="stylesheet">

<style>

*{
  margin:0;
  padding:0;
  box-sizing:border-box;
  font-family:'Poppins',sans-serif;
}

body{
  background:#050816;
  color:white;
}

.container{
  width:90%;
  max-width:1200px;
  margin:auto;
}

/* NAV */
nav{
  display:flex;
  justify-content:space-between;
  align-items:center;
  padding:20px 0;
  border-bottom:1px solid rgba(0,229,255,0.1);
}

.logo{
  font-size:28px;
  font-weight:700;
  color:#00e5ff;
}

.menu{
  display:flex;
  gap:25px;
}

.menu a{
  color:white;
  text-decoration:none;
}

.menu a:hover{
  color:#00e5ff;
}

.apply-btn{
  padding:10px 18px;
  border:1px solid #00e5ff;
  border-radius:8px;
  color:#00e5ff;
}

/* TITLE */
.page-title{
  text-align:center;
  margin-top:40px;
}

.page-title h1{
  font-size:42px;
}

.page-title span{
  color:#00e5ff;
}

.page-title p{
  color:#9ca3af;
  margin-top:10px;
}

/* FORM */
.main-grid{
  display:grid;
  grid-template-columns:1fr;
  margin-top:40px;
}

.card{
  background:#08101f;
  border:1px solid rgba(0,229,255,0.15);
  border-radius:20px;
  padding:30px;
}

.form-title{
  color:#00e5ff;
  margin-bottom:20px;
}

.input-group{
  margin-bottom:20px;
  padding:10px;
  border-radius:10px;
  transition:0.3s;
}

.input-group.focused{
  background:rgba(0,229,255,0.08);
  border:1px solid rgba(0,229,255,0.4);
  box-shadow:0 0 12px rgba(0,229,255,0.2);
}

.input-group label{
  display:block;
  margin-bottom:8px;
  color:#d1d5db;
}

.input-group input,
.input-group select{
  width:100%;
  padding:14px;
  border-radius:10px;
  border:1px solid rgba(255,255,255,0.1);
  background:#050816;
  color:white;
}

.row{
  display:grid;
  grid-template-columns:1fr 1fr;
  gap:20px;
}

/* PROMO */
.promo-box{
  display:flex;
  gap:10px;
}

.promo-box input{
  flex:1;
}

.promo-btn{
  background:#005eff;
  color:white;
  border:none;
  padding:14px 20px;
  border-radius:10px;
  cursor:pointer;
}

/* SUMMARY */
.summary-box{
  background:#050816;
  border:1px solid rgba(0,229,255,0.15);
  border-radius:15px;
  padding:20px;
  margin-top:20px;
}

.summary-row{
  display:flex;
  justify-content:space-between;
  margin:12px 0;
  color:#d1d5db;
}

.service{ color:#00e5ff; }
.discount{ color:#ff4d4d; }

.total{
  font-size:22px;
  font-weight:700;
  color:#00e5ff;
}

/* BUTTON */
.submit-btn{
  width:100%;
  padding:16px;
  margin-top:20px;
  border:none;
  border-radius:10px;
  background:#005eff;
  color:white;
  font-size:18px;
  cursor:pointer;
}

.submit-btn:hover{
  background:#0077ff;
}

/* MOBILE */
@media(max-width:768px){
  .row{
    grid-template-columns:1fr;
  }
  .menu{
    display:none;
  }
}

</style>
</head>

<body>

<div class="container">

<!-- NAV -->
<nav>
  <div class="logo">Net Connection BD</div>
  <div class="menu">
    <a href="#">Home</a>
    <a href="#">Packages</a>
    <a href="#">Contact</a>
  </div>
  <div class="apply-btn">Apply</div>
</nav>

<!-- TITLE -->
<div class="page-title">
  <h1>New Line <span>Apply</span></h1>
  <p>Fill your information below</p>
</div>

<!-- FORM -->
<div class="main-grid">

<div class="card">

<h2 class="form-title">Applicant Information</h2>

<div class="row">

<div class="input-group">
<label>Name</label>
<input type="text" id="name">
</div>

<div class="input-group">
<label>Phone</label>
<input type="text" id="phone">
</div>

</div>

<div class="input-group">
<label>Email</label>
<input type="email" id="email">
</div>

<div class="input-group">
<label>Address</label>
<input type="text" id="address">
</div>

<div class="input-group">
<label>Location</label>
<input type="text" id="map">
</div>

<div class="input-group">
<label>Package</label>
<select id="packageSelect">
  <option value="500">10 Mbps - 500</option>
  <option value="800" selected>20 Mbps - 800</option>
  <option value="1200">50 Mbps - 1200</option>
</select>
</div>

<div class="input-group">
<label>Promo Code</label>
<div class="promo-box">
  <input type="text" id="promoCode">
  <button type="button" class="promo-btn" onclick="applyPromo()">Apply</button>
  <div id="promoMessage"></div>
</div>
</div>

<div class="summary-box">

<div class="summary-row">
<span>Package</span>
<span id="packagePrice">800</span>
</div>

<div class="summary-row service">
<span>Service</span>
<span>+500</span>
</div>

<div class="summary-row discount">
<span>Discount</span>
<span id="discountAmount">0</span>
</div>

<hr style="margin:10px 0; border-color:rgba(255,255,255,0.1)">

<div class="summary-row total">
<span>Total</span>
<span id="totalPayable">1300</span>
</div>

</div>

<button class="submit-btn" type="button" onclick="submitForm()">
Submit Application
</button>

</div>

</div>

</div>

<script>

const SCRIPT_URL = "https://script.google.com/macros/s/AKfycbznQfF_tx4d9dGU_aJWEsWSKmPouHlhM8B5nBnYhLQaVNmo3u0Jx_uXtBKlWHP6Ij0/exec";

let price = 800;
let discount = 0;

const packageSelect = document.getElementById("packageSelect");

packageSelect.addEventListener("change", function(){
  price = parseInt(this.value);
  discount = 0;
  updateUI();
});

function applyPromo(){

  let code = document.getElementById("promoCode").value.trim().toUpperCase();
  let msg = document.getElementById("promoMessage");

  const validCodes = {
    "SAVE20": 160,
    "OFF50": 50
  };

  if(code === ""){
    discount = 0;
    msg.style.color = "orange";
    msg.innerText = "⚠ Enter promo code";
  }
  else if(validCodes[code] !== undefined){
    discount = validCodes[code];
    msg.style.color = "#00ff88";
    msg.innerText = "✅ Valid Promo Code Applied";
  }
  else{
    discount = 0;
    msg.style.color = "#ff4d4d";
    msg.innerText = "❌ Invalid Promo Code";
  }

  updateUI();
}

function updateUI(){

  let total = price + 500 - discount;

  document.getElementById("packagePrice").innerText = price;
  document.getElementById("discountAmount").innerText = discount;
  document.getElementById("totalPayable").innerText = total;

}

/* INPUT HIGHLIGHT */
document.querySelectorAll("input, select").forEach(el=>{
  el.addEventListener("focus", ()=>{
    el.closest(".input-group").classList.add("focused");
  });
  el.addEventListener("blur", ()=>{
    el.closest(".input-group").classList.remove("focused");
  });
});

/* SUBMIT */
function submitForm(){

  const data = {
    name: document.getElementById("name").value,
    phone: document.getElementById("phone").value,
    email: document.getElementById("email").value,
    address: document.getElementById("address").value,
    map: document.getElementById("map").value,
    package: packageSelect.options[packageSelect.selectedIndex].text,
    price: price,
    discount: discount,
    promo: document.getElementById("promoCode").value,
    total: price + 500 - discount
  };

  fetch(SCRIPT_URL, {
    method: "POST",
    headers: {"Content-Type":"text/plain;charset=utf-8"},
    body: JSON.stringify(data)
  })

  .then(res => res.text())
  .then(res => {
    alert("✅ Submitted Successfully");
    console.log(res);
  })

  .catch(err => {
    console.log(err);
    alert("❌ Error Occurred");
  });

}

updateUI();

</script>

</body>
</html>
