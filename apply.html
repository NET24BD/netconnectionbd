<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<title>Net Connection BD - Apply</title>

<link href="https://fonts.googleapis.com/css2?family=Poppins:wght@300;400;500;600;700&display=swap" rel="stylesheet">

<style>

*{
  margin:0;
  padding:0;
  box-sizing:border-box;
  font-family:'Poppins',sans-serif;
}

body{
  background:#050816;
  color:white;
}

.container{
  width:90%;
  max-width:1200px;
  margin:auto;
}

/* NAV */
nav{
  display:flex;
  justify-content:space-between;
  align-items:center;
  padding:20px 0;
  border-bottom:1px solid rgba(0,229,255,0.1);
}

.logo{
  font-size:28px;
  font-weight:700;
  color:#00e5ff;
}

.menu{
  display:flex;
  gap:25px;
}

.menu a{
  color:white;
  text-decoration:none;
}

.apply-btn{
  padding:10px 18px;
  border:1px solid #00e5ff;
  border-radius:8px;
  color:#00e5ff;
}

/* TITLE */
.page-title{
  text-align:center;
  margin-top:40px;
}

.page-title h1{
  font-size:42px;
}

.page-title span{
  color:#00e5ff;
}

/* CARD */
.card{
  background:#08101f;
  border:1px solid rgba(0,229,255,0.15);
  border-radius:20px;
  padding:30px;
  margin-top:40px;
}

/* INPUT */
.input-group{
  margin-bottom:20px;
}

.input-group label{
  display:block;
  margin-bottom:8px;
  color:#d1d5db;
}

.input-group input,
.input-group select{
  width:100%;
  padding:14px;
  border-radius:10px;
  border:1px solid rgba(255,255,255,0.1);
  background:#050816;
  color:white;
}

.row{
  display:grid;
  grid-template-columns:1fr 1fr;
  gap:20px;
}

/* PROMO */
.promo-box{
  display:flex;
  gap:10px;
}

.promo-box input{
  flex:1;
}

.promo-box button{
  background:#005eff;
  color:white;
  border:none;
  padding:14px 20px;
  border-radius:10px;
  cursor:pointer;
}

/* PROMO MESSAGE */
#promoMsg{
  margin-top:8px;
  font-size:14px;
}

/* SUMMARY */
.summary-box{
  margin-top:20px;
  padding:20px;
  border:1px solid rgba(0,229,255,0.15);
  border-radius:15px;
}

.summary-row{
  display:flex;
  justify-content:space-between;
  margin:10px 0;
}

.service{ color:#00e5ff; }
.discount{ color:#ff4d4d; }

.total{
  font-size:20px;
  font-weight:700;
  color:#00e5ff;
}

/* BUTTON */
.submit-btn{
  width:100%;
  padding:16px;
  margin-top:20px;
  border:none;
  border-radius:10px;
  background:#005eff;
  color:white;
  font-size:18px;
  cursor:pointer;
}

@media(max-width:768px){
  .row{grid-template-columns:1fr;}
  .menu{display:none;}
}

</style>
</head>

<body>

<div class="container">

<nav>
  <div class="logo">Net Connection BD</div>
  <div class="menu">
    <a href="#">Home</a>
    <a href="#">Packages</a>
    <a href="#">Contact</a>
  </div>
  <div class="apply-btn">Apply</div>
</nav>

<div class="page-title">
  <h1>New Line <span>Apply</span></h1>
</div>

<div class="card">

<h2>Applicant Information</h2>

<div class="row">
  <div class="input-group">
    <label>Full Name</label>
    <input id="fullName" type="text">
  </div>

  <div class="input-group">
    <label>Phone</label>
    <input id="phone" type="text">
  </div>
</div>

<div class="input-group">
  <label>Email</label>
  <input id="email" type="email">
</div>

<div class="input-group">
  <label>Address</label>
  <input id="address" type="text">
</div>

<div class="input-group">
  <label>Google Map Link</label>
  <input id="map" type="text">
</div>

<div class="input-group">
  <label>Package</label>
  <select id="packageSelect">
    <option value="500">20 Mbps - 500 BDT</option>
    <option value="600" selected>30 Mbps - 600 BDT</option>
    <option value="800">40 Mbps - 800 BDT</option>
    <option value="1200">50 Mbps - 1200 BDT</option>
  </select>
</div>

<div class="input-group">
  <label>Promo Code</label>
  <div class="promo-box">
    <input id="promoCode" type="text">
    <button id="promoBtn" onclick="applyPromo()">Apply</button>
  </div>

  <div id="promoMsg"></div>
</div>

<div class="summary-box">

<div class="summary-row">
  <span>Price</span>
  <span id="price">600 BDT</span>
</div>

<div class="summary-row service">
  <span>Service Charge</span>
  <span>+300 BDT</span>
</div>

<div class="summary-row discount">
  <span>Discount</span>
  <span id="discount">0 BDT</span>
</div>

<hr>

<div class="summary-row total">
  <span>Total</span>
  <span id="total">900 BDT</span>
</div>

</div>

<button class="submit-btn" id="submitBtn">Submit Application</button>

</div>

</div>

<script>

const SCRIPT_URL = "https://script.google.com/macros/s/AKfycbyE2l3Nsvpvn6MxyPyNlpCjrqMlalXQ4RFekB8RNp1UKVJZ1dvXbe69uN406O8dOo1j4Q/exec";

let discount = 0;
const service = 300;

const packageSelect = document.getElementById("packageSelect");
const priceEl = document.getElementById("price");
const discountEl = document.getElementById("discount");
const totalEl = document.getElementById("total");

const promoCode = document.getElementById("promoCode");
const promoBtn = document.getElementById("promoBtn");
const promoMsg = document.getElementById("promoMsg");
const submitBtn = document.getElementById("submitBtn");

function update(){
  let price = parseInt(packageSelect.value);
  let total = price + service - discount;

  priceEl.innerText = price + " BDT";
  discountEl.innerText = "-" + discount + " BDT";
  totalEl.innerText = total + " BDT";
}

packageSelect.addEventListener("change", ()=>{
  discount = 0;
  promoMsg.innerText = "";
  update();
});

function applyPromo(){

  let code = promoCode.value.trim().toUpperCase();

  promoBtn.disabled = true;
  promoBtn.innerText = "Checking...";
  promoMsg.innerText = "";

  setTimeout(()=>{

    if(code === "SAVE20"){
      discount = 200;
      promoMsg.innerText = "✔ SAVE20 Applied Successfully!";
      promoMsg.style.color = "lightgreen";
    }
    else if(code === "NET200"){
      discount = 200;
      promoMsg.innerText = "✔ NET200 Applied Successfully!";
      promoMsg.style.color = "lightgreen";
    }
    else if(code === "OFF50"){
      discount = 50;
      promoMsg.innerText = "✔ OFF50 Applied Successfully!";
      promoMsg.style.color = "lightgreen";
    }
    else{
      discount = 0;
      promoMsg.innerText = "✖ Invalid Promo Code!";
      promoMsg.style.color = "#ff4d4d";
    }

    update();

    promoBtn.innerText = "Applied ✔";

    setTimeout(()=>{
      promoBtn.innerText = "Apply";
      promoBtn.disabled = false;
    },1500);

  },500);

}

function validate(){

  let name = fullName.value.trim();
  let phone = document.getElementById("phone").value.trim();
  let email = document.getElementById("email").value.trim();
  let address = document.getElementById("address").value.trim();
  let map = document.getElementById("map").value.trim();

  if(!name || !phone || !email || !address || !map){
    alert("Please fill all fields");
    return false;
  }

  if(!/^01\d{9}$/.test(phone)){
    alert("Invalid phone number");
    return false;
  }

  return true;
}

submitBtn.addEventListener("click", async ()=>{

  if(!validate()) return;

  submitBtn.disabled = true;
  submitBtn.innerText = "Submitting...";

  try{

    await fetch(SCRIPT_URL,{
      method:"POST",
      headers:{
        "Content-Type":"application/json"
      },
      body:JSON.stringify({
        type:"customer",
        name: fullName.value,
        phone: phone.value,
        email: email.value,
        address: address.value,
        map: map.value,
        package: packageSelect.options[packageSelect.selectedIndex].text,
        price: parseInt(packageSelect.value),
        discount: discount,
        promo: promoCode.value
      })
    });

    alert("Submitted Successfully!");

    document.querySelectorAll("input").forEach(i=>i.value="");

    discount = 0;
    promoMsg.innerText = "";
    update();

  }catch(err){
    console.log("FULL ERROR:", err);
  alert(err?.message || err);
  }

  submitBtn.disabled = false;
  submitBtn.innerText = "Submit Application";

});

update();

</script>

</body>
</html>
