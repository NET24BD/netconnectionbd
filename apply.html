<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<title>Net Connection BD - Apply</title>

<link href="https://fonts.googleapis.com/css2?family=Poppins:wght@300;400;500;600;700&display=swap" rel="stylesheet">

<style>

/* RESET */
*{
  margin:0;
  padding:0;
  box-sizing:border-box;
  font-family:'Poppins',sans-serif;
}

body{
  background:#050816;
  color:white;
}

.container{
  width:90%;
  max-width:1200px;
  margin:auto;
}

/* NAV */
nav{
  display:flex;
  justify-content:space-between;
  align-items:center;
  padding:20px 0;
  border-bottom:1px solid rgba(0,229,255,0.1);
}

.logo{
  font-size:28px;
  font-weight:700;
  color:#00e5ff;
}

.menu{
  display:flex;
  gap:25px;
}

.menu a{
  color:white;
  text-decoration:none;
}

.menu a:hover{
  color:#00e5ff;
}

.apply-btn{
  padding:10px 18px;
  border:1px solid #00e5ff;
  border-radius:8px;
  color:#00e5ff;
}

/* TITLE */
.page-title{
  text-align:center;
  margin-top:40px;
}

.page-title h1{
  font-size:42px;
}

.page-title span{
  color:#00e5ff;
}

.page-title p{
  color:#9ca3af;
  margin-top:10px;
}

/* FORM */
.main-grid{
  display:grid;
  grid-template-columns:1fr;
  margin-top:40px;
}

.card{
  background:#08101f;
  border:1px solid rgba(0,229,255,0.15);
  border-radius:20px;
  padding:30px;
}

.form-title{
  color:#00e5ff;
  margin-bottom:20px;
}

.input-group{
  margin-bottom:20px;
}

.input-group label{
  display:block;
  margin-bottom:8px;
  color:#d1d5db;
}

.input-group input,
.input-group select{
  width:100%;
  padding:14px;
  border-radius:10px;
  border:1px solid rgba(255,255,255,0.1);
  background:#050816;
  color:white;
}

.row{
  display:grid;
  grid-template-columns:1fr 1fr;
  gap:20px;
}

/* PROMO */
.promo-box{
  display:flex;
  gap:10px;
}

.promo-box input{
  flex:1;
}

.promo-btn{
  background:#005eff;
  color:white;
  border:none;
  padding:14px 20px;
  border-radius:10px;
  cursor:pointer;
}

/* SUMMARY */
.summary-box{
  background:#050816;
  border:1px solid rgba(0,229,255,0.15);
  border-radius:15px;
  padding:20px;
  margin-top:20px;
}

.summary-row{
  display:flex;
  justify-content:space-between;
  margin:12px 0;
  color:#d1d5db;
}

.service{ color:#00e5ff; }
.discount{ color:#ff4d4d; }

.total{
  font-size:22px;
  font-weight:700;
  color:#00e5ff;
}

/* BUTTON */
.submit-btn{
  width:100%;
  padding:16px;
  margin-top:20px;
  border:none;
  border-radius:10px;
  background:#005eff;
  color:white;
  font-size:18px;
  cursor:pointer;
}

.submit-btn:hover{
  background:#0077ff;
}

/* MOBILE */
@media(max-width:768px){
  .row{
    grid-template-columns:1fr;
  }
  .menu{display:none;}
}

</style>
</head>

<body>

<div class="container">

<!-- NAV -->
<nav>
  <div class="logo">Net Connection BD</div>

  <div class="menu">
    <a href="#">Home</a>
    <a href="#">Packages</a>
    <a href="#">Contact</a>
  </div>

  <div class="apply-btn">Apply</div>
</nav>

<!-- TITLE -->
<div class="page-title">
  <h1>New Line <span>Apply</span></h1>
  <p>Fill your information below</p>
</div>

<!-- FORM -->
<div class="main-grid">

<div class="card">

<h2 class="form-title">Applicant Information</h2>

<!-- NAME + PHONE -->
<div class="row">

<div class="input-group">
<label>Full Name</label>
<input type="text" placeholder="Enter your name">
</div>

<div class="input-group">
<label>Phone Number</label>
<input type="text" placeholder="01XXXXXXXXX">
</div>

</div>

<!-- EMAIL -->
<div class="input-group">
<label>Email Address</label>
<input type="email" placeholder="example@gmail.com">
</div>

<!-- ADDRESS -->
<div class="input-group">
<label>Address</label>
<input type="text" placeholder="Enter address">
</div>

<!-- LIVE LOCATION -->
<div class="input-group">
<label>Live Location (Google Map Link)</label>
<input type="text" placeholder="https://maps.google.com/...">
</div>

<!-- PACKAGE -->
<div class="input-group">
<label>Select Package</label>
<select id="packageSelect">
  <option value="500">10 Mbps - 500 BDT</option>
  <option value="800" selected>20 Mbps - 800 BDT</option>
  <option value="1200">50 Mbps - 1200 BDT</option>
</select>
</div>

<!-- PACKAGE PRICE -->
<div class="input-group">
<label>Package Price</label>
<input type="text" id="packagePrice" value="800 BDT" readonly>
</div>

<!-- PROMO -->
<div class="input-group">
<label>Promo Code (Optional)</label>

<div class="promo-box">
  <input type="text" id="promoCode" placeholder="SAVE20">
  <button class="promo-btn" onclick="applyPromo()">Apply</button>
</div>

</div>

<!-- SUMMARY -->
<div class="summary-box">

<div class="summary-row">
<span>Original Price</span>
<span id="originalPrice">800 BDT</span>
</div>

<div class="summary-row service">
<span>Service Charge</span>
<span>+500 BDT</span>
</div>

<div class="summary-row discount">
<span>Discount</span>
<span id="discountAmount">-0 BDT</span>
</div>

<hr style="border-color:rgba(255,255,255,0.1); margin:10px 0;">

<div class="summary-row total">
<span>Total Payment</span>
<span id="totalPayable">1300 BDT</span>
</div>

</div>

<!-- SUBMIT -->
<button class="submit-btn">Submit Application</button>

</div>

</div>

</div>

<script>

const packageSelect = document.getElementById("packageSelect");
const packagePrice = document.getElementById("packagePrice");
const originalPrice = document.getElementById("originalPrice");
const discountAmount = document.getElementById("discountAmount");
const totalPayable = document.getElementById("totalPayable");
const promoCode = document.getElementById("promoCode");

let currentPrice = 800;
let discount = 0;

packageSelect.addEventListener("change", function(){

currentPrice = parseInt(this.value);
discount = 0; // reset promo on change
updateUI();

});

function applyPromo(){

let code = promoCode.value.trim().toUpperCase();

// Promo rules
if(code === "SAVE20"){
  discount = 160;
}
else if(code === "OFF50"){
  discount = 50;
}
else{
  discount = 0;
}

updateUI();

}

function updateUI(){

let service = 500;
let total = currentPrice + service - discount;

packagePrice.value = currentPrice + " BDT";
originalPrice.innerText = currentPrice + " BDT";
discountAmount.innerText = "-" + discount + " BDT";
totalPayable.innerText = total + " BDT";

}

// init
updateUI();

</script>

</body>
</html>
