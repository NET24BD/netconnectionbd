<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8" />
<meta name="viewport" content="width=device-width, initial-scale=1.0"/>
<title>Apply Form</title>

<style>

*{
  margin:0;
  padding:0;
  box-sizing:border-box;
}

body{
  font-family:Arial, sans-serif;
  background:#050816;
  color:white;
}

/* MAIN */
.container{
  width:100%;
  max-width:650px;
  margin:auto;
  padding:40px 16px;
}

/* TITLE */
h1{
  text-align:center;
  margin-bottom:25px;
  font-size:42px;
  font-weight:700;
}

h1 span{
  color:#00e5ff;
}

/* CARD */
.card{
  background:#08101f;
  border:1px solid rgba(0,229,255,0.18);
  border-radius:18px;
  padding:22px;
  display:flex;
  flex-direction:column;
  gap:14px;
}

/* ROW */
.row{
  display:grid;
  grid-template-columns:1fr 1fr;
  gap:14px;
}

/* INPUT */
input,
select{
  width:100%;
  height:54px;
  padding:0 15px;
  border-radius:10px;
  border:1px solid rgba(255,255,255,0.08);
  background:#050816;
  color:white;
  outline:none;
  font-size:15px;
  transition:0.2s;
}

input:focus,
select:focus{
  border-color:#00e5ff;
  box-shadow:0 0 10px rgba(0,229,255,0.2);
}

/* PROMO */
.promo{
  display:flex;
  gap:10px;
}

.promo input{
  flex:1;
}

.promo button{
  min-width:95px;
  border:none;
  border-radius:10px;
  background:#0b63ff;
  color:white;
  cursor:pointer;
  font-size:15px;
}

/* MESSAGE */
#promoMsg{
  font-size:14px;
  margin-top:-4px;
}

/* BILL */
.bill-box{
  background:#050816;
  border:1px solid rgba(0,229,255,0.16);
  border-radius:14px;
  padding:16px;
}

.line{
  display:flex;
  justify-content:space-between;
  align-items:center;
  padding:8px 2px;
}

.line span{
  font-size:17px;
  font-weight:500;
}

/* COLORS */
.price span{
  color:#00ff66;
}

.service span{
  color:#d7e8ff;
}

.discount span{
  color:#ff4d4d;
}

.total span{
  color:#00e5ff;
  font-weight:700;
  font-size:20px;
}

/* BUTTON */
.submit{
  width:100%;
  height:55px;
  border:none;
  border-radius:12px;
  background:linear-gradient(90deg,#0b63ff,#00cfff);
  color:white;
  font-size:18px;
  cursor:pointer;
}

/* MOBILE */
@media(max-width:700px){

  h1{
    font-size:34px;
  }

  .container{
    padding:20px 12px;
  }

  .card{
    padding:16px;
  }

  .row{
    grid-template-columns:1fr;
  }

  input,
  select{
    height:50px;
    font-size:14px;
  }

  .promo button{
    min-width:85px;
  }

  .line span{
    font-size:15px;
  }

  .total span{
    font-size:18px;
  }

}

</style>

</head>

<body>

<div class="container">

<h1>Apply <span>Now</span></h1>

<div class="card">

<!-- NAME + PHONE -->
<div class="row">
  <input type="text" id="name" placeholder="Full Name">
  <input type="text" id="phone" placeholder="Phone Number">
</div>

<!-- EMAIL -->
<input type="email" id="email" placeholder="Email Address">

<!-- ADDRESS -->
<input type="text" id="address" placeholder="Address">

<!-- MAP -->
<input type="text" id="map" placeholder="Location / Map Link">

<!-- PACKAGE -->
<select id="package" onchange="updatePrice()">
  <option value="600">30 Mbps - 600 BDT</option>
  <option value="800">40 Mbps - 800 BDT</option>
  <option value="1000">50 Mbps - 1000 BDT</option>
</select>

<!-- PROMO -->
<div class="promo">
  <input type="text" id="promo" placeholder="Promo Code">
  <button onclick="applyPromo()">Apply</button>
</div>

<div id="promoMsg"></div>

<!-- BILL -->
<div class="bill-box">

  <div class="line price">
    <span>Price</span>
    <span id="price">600 BDT</span>
  </div>

  <div class="line service">
    <span>Service</span>
    <span>300 BDT</span>
  </div>

  <div class="line discount">
    <span>Discount</span>
    <span id="discount">0 BDT</span>
  </div>

  <hr style="border:1px solid rgba(255,255,255,0.08); margin:8px 0;">

  <div class="line total">
    <span>Total</span>
    <span id="total">900 BDT</span>
  </div>

</div>

<!-- SUBMIT -->
<button class="submit" onclick="submitForm()">
  Submit Application
</button>

</div>

</div>

<script>

const SCRIPT_URL = "YOUR_SCRIPT_URL";

let discount = 0;
const serviceCharge = 300;

/* UPDATE PRICE */
function updatePrice(){

  const packageValue =
    parseInt(document.getElementById("package").value);

  document.getElementById("price").innerText =
    packageValue + " BDT";

  const total =
    packageValue + serviceCharge - discount;

  document.getElementById("discount").innerText =
    discount + " BDT";

  document.getElementById("total").innerText =
    total + " BDT";
}

/* PROMO */
function applyPromo(){

  const code =
    document.getElementById("promo")
    .value
    .trim()
    .toUpperCase();

  const msg =
    document.getElementById("promoMsg");

  if(code === "SAVE20"){

    discount = 200;

    msg.innerText =
      "✔ Promo Applied Successfully";

    msg.style.color = "#00ff99";

  }else{

    discount = 0;

    msg.innerText =
      "✖ Invalid Promo Code";

    msg.style.color = "#ff4d4d";
  }

  updatePrice();
}

/* SUBMIT */
function submitForm(){

  const name =
    document.getElementById("name").value.trim();

  const phone =
    document.getElementById("phone").value.trim();

  const email =
    document.getElementById("email").value.trim();

  const address =
    document.getElementById("address").value.trim();

  const map =
    document.getElementById("map").value.trim();

  if(
    !name ||
    !phone ||
    !email ||
    !address ||
    !map
  ){
    alert("Please fill all fields");
    return;
  }

  const packageSelect =
    document.getElementById("package");

  const packageText =
    packageSelect.options[
      packageSelect.selectedIndex
    ].text;

  const packageValue =
    parseInt(packageSelect.value);

  fetch(SCRIPT_URL,{

    method:"POST",

    headers:{
      "Content-Type":"text/plain"
    },

    body:JSON.stringify({

      name:name,
      phone:phone,
      email:email,
      address:address,
      map:map,

      package:packageText,
      price:packageValue,

      service:serviceCharge,

      discount:discount,

      total:
        packageValue +
        serviceCharge -
        discount,

      promo:
        document.getElementById("promo").value

    })

  })

  .then(res=>res.text())

  .then(()=>{

    alert("Application Submitted Successfully");

  })

  .catch(err=>{

    alert("Error: " + err);

  });

}

updatePrice();

</script>

</body>
</html>
