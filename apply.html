<!DOCTYPE html>
<html lang="en">

<head>

<meta charset="UTF-8">

<meta name="viewport"
content="width=device-width, initial-scale=1.0">

<title>
Apply - Net Connection BD
</title>

<link rel="preconnect"
href="https://fonts.googleapis.com">

<link href="https://fonts.googleapis.com/css2?family=Poppins:wght@300;400;500;600;700&display=swap"
rel="stylesheet">

<style>

*{
  margin:0;
  padding:0;
  box-sizing:border-box;
  font-family:'Poppins',sans-serif;
}

body{
  background:#050816;
  color:white;
}

.container{
  width:90%;
  max-width:700px;
  margin:auto;
}

section{
  padding:80px 0;
}

.section-title{
  text-align:center;
  color:#00e5ff;
  font-size:40px;
  margin-bottom:40px;
}

.apply-box{
  background:#0b1228;
  padding:40px;
  border-radius:25px;
  border:1px solid rgba(0,255,255,0.15);

  display:flex;
  flex-direction:column;
  gap:18px;
}

.apply-box label{
  color:#00e5ff;
}

.apply-box input,
.apply-box select{

  width:100%;
  padding:16px;
  border-radius:14px;
  border:1px solid rgba(0,255,255,0.15);
  background:#050816;
  color:white;
  outline:none;
}

.btn{
  padding:16px;
  border:none;
  border-radius:14px;
  background:#00e5ff;
  color:black;
  font-weight:600;
  cursor:pointer;
}

.btn:hover{
  box-shadow:0 0 20px #00e5ff;
}

</style>

</head>

<body>

<section>

<div class="container">

<h2 class="section-title">
New Line Apply
</h2>

<form id="applyForm"
class="apply-box">

<label>Name:</label>

<input type="text"
id="name"
required>

<label>Phone:</label>

<input type="text"
id="phone"
required>

<label>Package:</label>

<select id="package">

<option>
10 Mbps - ৳500
</option>

<option>
20 Mbps - ৳800
</option>

<option>
50 Mbps - ৳1200
</option>

</select>

<label>Address:</label>

<input type="text"
id="address"
required>

<label>Live Location:</label>

<input type="text"
id="location"
placeholder="Google Map Link">

<button type="submit"
class="btn">

Submit Application

</button>

</form>

</div>

</section>

<script>

const scriptURL =
"https://script.google.com/macros/s/AKfycbz0PiERkGa7DgjVL3PWL3U7V93fgBNdaeIaoqkunzuGEKfY25VOu1RBIO5cP9G0LUVB/exec";

document
.getElementById("applyForm")

.addEventListener("submit",
async function(e){

e.preventDefault();

const data = {

name:
document.getElementById("name").value,

phone:
document.getElementById("phone").value,

package:
document.getElementById("package").value,

address:
document.getElementById("address").value,

location:
document.getElementById("location").value

};

fetch(scriptURL, {

method:"POST",

body:JSON.stringify(data)

})

.then(res => {

alert(
"Application Submitted Successfully!"
);

document
.getElementById("applyForm")
.reset();

})

.catch(err => {

alert("Error!");

});

});

</script>

</body>
</html>
