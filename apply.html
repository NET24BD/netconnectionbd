<!DOCTYPE html>
<html lang="en">

<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<title>Net Connection BD - Apply</title>

<link href="https://fonts.googleapis.com/css2?family=Poppins:wght@300;400;500;600;700&display=swap" rel="stylesheet">

<style>

/* RESET */
*{
  margin:0;
  padding:0;
  box-sizing:border-box;
  font-family:'Poppins',sans-serif;
}

/* 🔥 BLUE + BLACK BACKGROUND */
body{

  background:
  linear-gradient(
    rgba(2,6,23,0.82),
    rgba(3,7,18,0.88)
  ),
  url("/mnt/data/image(26).png");

  background-size:cover;
  background-position:center;
  background-attachment:fixed;

  color:white;
  min-height:100vh;

}

/* CONTAINER */
.container{
  width:90%;
  max-width:1100px;
  margin:auto;
}

/* NAVBAR */
nav{
  display:flex;
  justify-content:space-between;
  align-items:center;
  padding:25px 0;
}

.logo{
  font-size:30px;
  font-weight:700;
  color:#00e5ff;
  text-shadow:0 0 15px rgba(0,229,255,0.4);
}

.menu a{
  color:white;
  text-decoration:none;
  border:1px solid rgba(0,229,255,0.5);
  padding:10px 18px;
  border-radius:10px;
  transition:0.3s;
  background:rgba(0,0,0,0.25);
}

.menu a:hover{
  background:#00e5ff;
  color:black;
  box-shadow:0 0 18px rgba(0,229,255,0.5);
}

/* TITLE */
.page-title{
  text-align:center;
  margin-top:20px;
}

.page-title h1{
  font-size:42px;
  color:white;
}

.page-title span{
  color:#00e5ff;
}

.page-title p{
  color:#cbd5e1;
  margin-top:10px;
}

/* FORM CARD */
.card{

  background:rgba(8,15,35,0.78);

  border:1px solid rgba(0,229,255,0.18);

  border-radius:22px;

  padding:30px;

  margin-top:40px;

  backdrop-filter:blur(10px);

  box-shadow:
  0 0 30px rgba(0,0,0,0.45),
  0 0 18px rgba(0,229,255,0.08);

}

/* INPUT GROUP */
.input-group{
  margin-bottom:20px;
  padding:10px;
  border-radius:14px;
  transition:0.3s;
}

/* 🔥 BLUE BRIGHT EFFECT */
.input-group.focused{

  background:rgba(0,229,255,0.08);

  box-shadow:
  0 0 18px rgba(0,229,255,0.35);

}

/* ERROR */
.input-group.error input{
  border:1px solid #ff4d4d;
}

/* LABEL */
label{
  display:block;
  margin-bottom:8px;
  color:#dbeafe;
  font-weight:500;
}

/* INPUT */
input,
select{

  width:100%;

  padding:14px;

  border-radius:12px;

  border:1px solid rgba(255,255,255,0.08);

  background:#050816;

  color:white;

  outline:none;

  transition:0.3s;

}

input:focus,
select:focus{

  border:1px solid #00e5ff;

  box-shadow:
  0 0 12px rgba(0,229,255,0.25);

}

/* PROMO */
.promo-box{
  display:flex;
  gap:10px;
}

.promo-btn{

  background:#0066ff;

  color:white;

  border:none;

  padding:14px 20px;

  border-radius:12px;

  cursor:pointer;

  transition:0.3s;

}

.promo-btn:hover{

  background:#0080ff;

  box-shadow:
  0 0 18px rgba(0,128,255,0.45);

}

#promoMessage{
  margin-top:10px;
  font-weight:600;
}

/* SUMMARY */
.summary-box{

  margin-top:20px;

  padding:20px;

  border-radius:18px;

  border:1px solid rgba(0,229,255,0.12);

  background:rgba(255,255,255,0.02);

}

.summary-row{
  display:flex;
  justify-content:space-between;
  margin:12px 0;
}

.service{
  color:#00e5ff;
}

.discount{
  color:#ff5e5e;
}

.total{
  font-size:22px;
  font-weight:700;
  color:#00e5ff;
}

/* SUBMIT BUTTON */
.submit-btn{

  width:100%;

  padding:16px;

  margin-top:20px;

  border:none;

  border-radius:12px;

  background:linear-gradient(90deg,#005eff,#00aaff);

  color:white;

  font-size:18px;

  cursor:pointer;

  transition:0.3s;

}

.submit-btn:hover{

  transform:translateY(-2px);

  box-shadow:
  0 0 22px rgba(0,119,255,0.45);

}

/* MOBILE */
@media(max-width:768px){

  .page-title h1{
    font-size:32px;
  }

  .promo-box{
    flex-direction:column;
  }

}

</style>
</head>

<body>

<div class="container">

<!-- NAVBAR -->
<nav>

<div class="logo">
Net Connection BD
</div>

<div class="menu">
<a href="index.html">Home</a>
</div>

</nav>

<!-- TITLE -->
<div class="page-title">
  <h1>New Line <span>Apply</span></h1>
  <p>Fill your information below</p>
</div>

<!-- FORM -->
<div class="card">

<!-- NAME -->
<div class="input-group">
<label>Name</label>
<input type="text" id="name">
</div>

<!-- PHONE -->
<div class="input-group">
<label>Phone</label>
<input type="text" id="phone">
</div>

<!-- EMAIL -->
<div class="input-group">
<label>Email</label>
<input type="email" id="email">
</div>

<!-- ADDRESS -->
<div class="input-group">
<label>Address</label>
<input type="text" id="address">
</div>

<!-- LOCATION -->
<div class="input-group">
<label>Location</label>
<input type="text" id="map">
</div>

<!-- PACKAGE -->
<div class="input-group">

<label>Package</label>

<select id="packageSelect">
  <option value="500">10 Mbps - 500</option>
  <option value="600" selected>30 Mbps - 600</option>
  <option value="800">40 Mbps - 800</option>
  <option value="1000">50 Mbps - 1000</option>
</select>

</div>

<!-- PROMO -->
<div class="input-group">

<label>Promo Code</label>

<div class="promo-box">

<input type="text" id="promoCode">

<button class="promo-btn" type="button" onclick="applyPromo()">
Apply
</button>

</div>

<div id="promoMessage"></div>

</div>

<!-- SUMMARY -->
<div class="summary-box">

<div class="summary-row">
<span>Package</span>
<span id="packagePrice">600</span>
</div>

<div class="summary-row service">
<span>Service Charge</span>
<span id="serviceCharge">350</span>
</div>

<div class="summary-row discount">
<span>Discount</span>
<span id="discountAmount">0</span>
</div>

<hr style="margin:10px 0; border-color:rgba(255,255,255,0.1)">

<div class="summary-row total">
<span>Total</span>
<span id="totalPayable">950</span>
</div>

</div>

<!-- SUBMIT -->
<button class="submit-btn" onclick="submitForm()">
Submit Application
</button>

</div>

</div>

<script>

const SCRIPT_URL = "https://script.google.com/macros/s/AKfycbznQfF_tx4d9dGU_aJWEsWSKmPouHlhM8B5nBnYhLQaVNmo3u0Jx_uXtBKlWHP6Ij0/exec";

let price = 600;
let serviceCharge = 350;
let discount = 0;

/* PROMO CODES */
const validCodes = {

  "SAVE20":160,
  "OFF50":50,
  "OFF30":200

};

/* INPUT GLOW EFFECT */
document.querySelectorAll("input, select").forEach(el=>{

  el.addEventListener("focus", ()=>{

    el.closest(".input-group").classList.add("focused");

  });

  el.addEventListener("blur", ()=>{

    el.closest(".input-group").classList.remove("focused");

  });

});

/* PACKAGE CHANGE */
document.getElementById("packageSelect").addEventListener("change", function(){

  price = parseInt(this.value);

  updateUI();

});

/* PROMO */
function applyPromo(){

  let code = document.getElementById("promoCode").value.trim().toUpperCase();

  let msg = document.getElementById("promoMessage");

  if(validCodes[code]){

    discount = validCodes[code];

    msg.innerText = "✅ Valid Promo Code";
    msg.style.color = "#00ff88";

  }else{

    discount = 0;

    msg.innerText = "❌ Invalid Promo Code";
    msg.style.color = "#ff4d4d";

  }

  updateUI();

}

/* UPDATE UI */
function updateUI(){

  let total = price + serviceCharge - discount;

  document.getElementById("packagePrice").innerText = price;

  document.getElementById("serviceCharge").innerText = serviceCharge;

  document.getElementById("discountAmount").innerText = discount;

  document.getElementById("totalPayable").innerText = total;

}

/* SUBMIT */
function submitForm(){

  let fields = ["name","phone","email","address","map"];

  let valid = true;

  fields.forEach(id=>{

    let input = document.getElementById(id);

    let group = input.closest(".input-group");

    if(input.value.trim() === ""){

      group.classList.add("error");

      valid = false;

    }else{

      group.classList.remove("error");

    }

  });

  if(!valid){

    alert("❌ Please fill all required fields!");

    return;

  }

  const data = {

    name: document.getElementById("name").value,
    phone: document.getElementById("phone").value,
    email: document.getElementById("email").value,
    address: document.getElementById("address").value,
    map: document.getElementById("map").value,

    package: packageSelect.options[packageSelect.selectedIndex].text,

    service: serviceCharge,

    discount: discount,

    promo: document.getElementById("promoCode").value,

    total: price + serviceCharge - discount

  };

  fetch(SCRIPT_URL, {

    method:"POST",

    headers:{
      "Content-Type":"text/plain;charset=utf-8"
    },

    body:JSON.stringify(data)

  })

  .then(r=>r.text())

  .then(()=>{

    alert("✅ Submitted Successfully!");

  })

  .catch(()=>{

    alert("❌ Error Occurred!");

  });

}

/* START */
updateUI();

</script>

</body>
</html>
