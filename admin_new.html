<!DOCTYPE html>
<html>
<head>
  <title>Admin Panel</title>
  <style>
    body{
      margin:0;
      font-family:Arial;
      background:#0f172a;
      color:white;
    }

    .center{
      height:100vh;
      display:flex;
      justify-content:center;
      align-items:center;
    }

    .box{
      background:#1f2937;
      padding:20px;
      border-radius:10px;
      width:300px;
    }

    input, button{
      width:100%;
      padding:10px;
      margin-top:10px;
    }

    button{
      background:#38bdf8;
      border:none;
      cursor:pointer;
      font-weight:bold;
    }

    .top{
      background:#111827;
      padding:15px;
      display:flex;
      justify-content:space-between;
    }

    .container{
      padding:20px;
    }

    .card{
      background:#1f2937;
      padding:15px;
      margin-bottom:10px;
      border-radius:10px;
    }
  </style>
</head>

<body>

<!-- LOGIN -->
<div id="loginBox" class="center">
  <div class="box">
    <h2>Admin Login</h2>
    <input id="u" placeholder="Username">
    <input id="p" placeholder="Password">
    <button onclick="login()">Login</button>
  </div>
</div>

<!-- PANEL -->
<div id="panel" style="display:none;">

  <div class="top">
    <h3>Admin Dashboard</h3>
    <button onclick="logout()">Logout</button>
  </div>

  <div class="container">

    <div class="card">
      <h3>Add User</h3>
      <input id="nu" placeholder="Username">
      <input id="np" placeholder="Password">
      <button onclick="addUser()">Add</button>
    </div>

    <div class="card">
      <h3>User List</h3>
      <div id="list">Loading...</div>
    </div>

  </div>
</div>

<script>

// 🔥 NEW URL (your backend)
const API = "https://script.google.com/macros/s/AKfycbwVeSGrZWdeW155_rlOutkKEvP4LM6irGlmTz__gLHiYVv3zhpNaCjJdO_KAOjMVDEw/exec";

// LOGIN
function login(){
  fetch(API + "?type=login&username=" + u.value + "&password=" + p.value)
  .then(res => res.json())
  .then(data => {

    console.log(data);

    if(data.status == "success"){
      document.getElementById("loginBox").style.display = "none";
      document.getElementById("panel").style.display = "block";
      loadUsers();
    } else {
      alert("Login Failed");
    }

  })
  .catch(err=>{
    alert("Server error / deploy issue");
    console.log(err);
  });
}

// ADD USER
function addUser(){
  fetch(API,{
    method:"POST",
    body:JSON.stringify({
      type:"addUser",
      username:nu.value,
      password:np.value,
      role:"user"
    })
  }).then(()=>loadUsers());
}

// LOAD USERS
function loadUsers(){
  fetch(API + "?type=users")
  .then(res=>res.json())
  .then(data=>{
    let html="";
    data.forEach(u=>{
      html += `<div class="card">👤 ${u.username} - ${u.role}</div>`;
    });
    document.getElementById("list").innerHTML = html;
  });
}

// LOGOUT
function logout(){
  location.reload();
}

</script>

</body>
</html>
