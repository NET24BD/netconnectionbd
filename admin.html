<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Admin Panel</title>

<style>
body{
    margin:0;
    font-family:Arial;
    background:#0b1220;
    color:white;
}

.header{
    background:#2563eb;
    padding:15px;
    display:flex;
    justify-content:space-between;
    align-items:center;
}

.container{
    padding:20px;
}

.card{
    background:#111827;
    padding:15px;
    border-radius:10px;
    margin-top:15px;
    box-shadow:0 0 15px rgba(37,99,235,0.2);
}

button{
    padding:10px 15px;
    border:none;
    border-radius:8px;
    background:red;
    color:white;
    cursor:pointer;
}

button:hover{
    background:#cc0000;
}
</style>
</head>

<body>

<div class="header">
    <h3>Admin Dashboard</h3>
    <button onclick="logout()">Logout</button>
</div>

<div class="container">

    <div class="card">
        <h3>Welcome Admin</h3>
        <p>You are now inside the admin panel.</p>
    </div>

    <div class="card">
        <h3>Status</h3>
        <p>System is running properly.</p>
    </div>

</div>

<script>

// login check
if(localStorage.getItem("adminLoggedIn") !== "true"){
    window.location.href = "login.html";
}

// logout function
function logout(){
    localStorage.removeItem("adminLoggedIn");
    window.location.href = "login.html";
}

</script>

</body>
</html>
