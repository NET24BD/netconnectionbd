<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<title>Net Connection BD Admin</title>

<style>
body{
  margin:0;
  font-family:Arial;
  background:#0b0f1a;
  color:#fff;
}

header{
  background:#111a2e;
  padding:15px;
  text-align:center;
  font-size:20px;
  font-weight:bold;
  border-bottom:2px solid #1e3cff;
}

.container{
  display:grid;
  grid-template-columns:1fr 1fr;
  gap:20px;
  padding:20px;
}

.box{
  background:#111a2e;
  padding:20px;
  border-radius:12px;
}

h3{ color:#1e90ff; }

input{
  width:100%;
  padding:10px;
  margin:8px 0;
  border:none;
  border-radius:6px;
}

button{
  width:100%;
  padding:10px;
  background:#1e3cff;
  color:white;
  border:none;
  border-radius:6px;
  cursor:pointer;
  font-weight:bold;
}

button:hover{
  background:#0d2bff;
}

table{
  width:100%;
  margin-top:10px;
  border-collapse:collapse;
}

th,td{
  border:1px solid #333;
  padding:8px;
  text-align:center;
}

th{
  background:#1e3cff;
}
</style>
</head>

<body>

<header>🔥 Net Connection BD - Admin Panel</header>

<div class="container">

<!-- PROMO ADD -->
<div class="box">
<h3>➕ Add Promo Code</h3>

<input id="code" placeholder="Promo Code">
<input id="discount" placeholder="Discount Amount">

<button onclick="addPromo()">Add Promo</button>
</div>

<!-- PROMO LIST -->
<div class="box">
<h3>📊 Promo Code List</h3>

<button onclick="loadPromo()">Refresh</button>

<table>
<thead>
<tr>
<th>Code</th>
<th>Discount</th>
<th>Status</th>
</tr>
</thead>

<tbody id="list"></tbody>
</table>

</div>

</div>

<script>

// 🔥 তোমার LIVE Google Script URL
const API_URL = "https://script.google.com/macros/s/AKfycbz_j_cGI5o1quI3ffG-hAmWCi7oc_5qol4kP8liJ1_8WXiASFM9KwGXIv6fnCuWKZR_/exec";

// ➕ Add Promo
function addPromo(){
  let code = document.getElementById("code").value;
  let discount = document.getElementById("discount").value;

  if(!code || !discount){
    alert("Fill all fields!");
    return;
  }

  fetch(API_URL,{
    method:"POST",
    body: JSON.stringify({
      type:"promo",
      code:code,
      discount:discount
    })
  })
  .then(res=>res.text())
  .then(()=>{
    alert("Promo Added Successfully!");
    loadPromo();
  });
}

// 📊 Load Promo List
function loadPromo(){
  fetch(API_URL)
  .then(res=>res.json())
  .then(data=>{
    let rows="";

    data.forEach(p=>{
      rows += `
      <tr>
        <td>${p.code}</td>
        <td>${p.discount}</td>
        <td>${p.status}</td>
      </tr>`;
    });

    document.getElementById("list").innerHTML = rows;
  });
}

loadPromo();
</script>

</body>
</html>
