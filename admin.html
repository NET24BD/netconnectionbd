<!DOCTYPE html>
<html>
<head>
<title>Full Admin Control</title>

<style>
body{
  background:#050816;
  color:white;
  font-family:Arial;
}

.login{
  text-align:center;
  margin-top:120px;
}

.panel{
  display:none;
}

input,button{
  padding:10px;
  margin:5px;
}

.container{
  display:grid;
  grid-template-columns:1fr 1fr;
  gap:20px;
  padding:20px;
}

.box{
  background:#111a2e;
  padding:20px;
  border-radius:10px;
}
h3{color:#00e5ff;}
button{
  background:#00e5ff;
  border:none;
  cursor:pointer;
}
</style>
</head>

<body>

<!-- 🔐 LOGIN -->
<div class="login" id="loginBox">
  <h2>Admin Login</h2>
  <input id="user" placeholder="Username"><br>
  <input id="pass" type="password" placeholder="Password"><br>
  <button onclick="login()">Login</button>
</div>

<!-- 📊 PANEL -->
<div class="panel" id="panel">

<h2 style="text-align:center;">🔥 ISP Control Panel</h2>

<div class="container">

<!-- PROMO -->
<div class="box">
<h3>💳 Promo Code</h3>
<input id="code" placeholder="Code">
<input id="discount" placeholder="Discount">
<button onclick="addPromo()">Add</button>
</div>

<!-- SETTINGS -->
<div class="box">
<h3>⚙️ Settings</h3>
<input id="key" placeholder="Key (e.g. service_charge)">
<input id="value" placeholder="Value">
<button onclick="updateSetting()">Update</button>
</div>

</div>

</div>

<script>

const API = "https://script.google.com/macros/s/AKfycbz_j_cGI5o1quI3ffG-hAmWCi7oc_5qol4kP8liJ1_8WXiASFM9KwGXIv6fnCuWKZR_/exec";

// 🔐 LOGIN
function login(){
  let u=document.getElementById("user").value;
  let p=document.getElementById("pass").value;

  if(u==="admin" && p==="1234"){
    document.getElementById("loginBox").style.display="none";
    document.getElementById("panel").style.display="block";
  } else {
    alert("Wrong login");
  }
}

// 💳 PROMO
function addPromo(){
  fetch(API,{
    method:"POST",
    body:JSON.stringify({
      type:"promo",
      code:document.getElementById("code").value,
      discount:document.getElementById("discount").value
    })
  });

  alert("Promo Added");
}

// ⚙️ SETTINGS
function updateSetting(){
  fetch(API,{
    method:"POST",
    body:JSON.stringify({
      type:"setting",
      key:document.getElementById("key").value,
      value:document.getElementById("value").value
    })
  });

  alert("Setting Updated");
}

</script>

</body>
</html>
