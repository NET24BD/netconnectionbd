<!DOCTYPE html>
<html>
<head>
  <title>Admin Panel</title>
  <style>
    body{
      margin:0;
      font-family:Arial;
      background:#0f172a;
      color:white;
    }

    .top{
      background:#111827;
      padding:15px;
      display:flex;
      justify-content:space-between;
    }

    .container{
      padding:20px;
    }

    .card{
      background:#1f2937;
      padding:15px;
      margin-bottom:10px;
      border-radius:10px;
    }

    input, select{
      padding:10px;
      margin:5px;
    }

    button{
      padding:10px;
      background:#38bdf8;
      border:none;
      cursor:pointer;
    }
  </style>
</head>
<body>

<div class="top">
  <h2>Admin Dashboard</h2>
  <button onclick="logout()">Logout</button>
</div>

<div class="container">

  <div class="card">
    <h3>Add User</h3>
    <input id="u" placeholder="Username">
    <input id="p" placeholder="Password">
    <select id="r">
      <option>admin</option>
      <option>user</option>
    </select>
    <button onclick="addUser()">Add</button>
  </div>

  <div class="card">
    <h3>Delete User</h3>
    <input id="du" placeholder="Username">
    <button onclick="deleteUser()">Delete</button>
  </div>

  <div class="card">
    <h3>User List</h3>
    <div id="list">Loading...</div>
  </div>

</div>

<script>
const API = "https://script.google.com/macros/library/d/1b-3xBSQ8nQhhyl_Atedn9ovFzu626rkpjhc_RMqllTN6ojXoCAN0xM1L/4";

// security check
if(!localStorage.getItem("role")){
  window.location.href = "login.html";
}

// ADD USER
function addUser(){
  fetch(API, {
    method:"POST",
    body: JSON.stringify({
      type:"addUser",
      username:u.value,
      password:p.value,
      role:r.value
    })
  }).then(()=>loadUsers());
}

// DELETE USER
function deleteUser(){
  fetch(API, {
    method:"POST",
    body: JSON.stringify({
      type:"deleteUser",
      username:du.value
    })
  }).then(()=>loadUsers());
}

// LOAD USERS
function loadUsers(){
  fetch(API + "?type=users")
  .then(res => res.json())
  .then(data => {
    let html = "";
    data.forEach(u => {
      html += `<div class="card">👤 ${u.username} - ${u.role}</div>`;
    });
    document.getElementById("list").innerHTML = html;
  });
}

// LOGOUT
function logout(){
  localStorage.removeItem("role");
  window.location.href = "login.html";
}

loadUsers();
</script>

</body>
</html>
