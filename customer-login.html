<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Customer Login</title>

<style>
body{
    margin:0;
    height:100vh;
    display:flex;
    justify-content:center;
    align-items:center;
    background:linear-gradient(135deg,#000,#0f172a,#2563eb);
    font-family:Arial;
}

.box{
    width:280px;
    background:#0f172a;
    padding:25px;
    border-radius:15px;
    text-align:center;
}

h2{color:white;}

input{
    width:100%;
    padding:12px;
    margin:8px 0;
    border:none;
    border-radius:8px;
    background:#1e293b;
    color:white;
}

button{
    width:100%;
    padding:12px;
    background:#2563eb;
    border:none;
    border-radius:8px;
    color:white;
    cursor:pointer;
}

#error{
    color:red;
    font-size:13px;
}
</style>
</head>

<body>

<div class="box">

<h2>Customer Login</h2>

<input type="text" id="user" placeholder="Customer ID">
<input type="password" id="pass" placeholder="Password">

<button onclick="login()">Login</button>

<p id="error"></p>

</div>

<script>

function login(){

let user = document.getElementById("user").value;
let pass = document.getElementById("pass").value;

// তোমার Google Apps Script URL
let url = "https://script.google.com/macros/s/AKfycbyvOzBF0NhMDksSyLuU5iV9kUjNyN59LMY3umBUfjyfCAUgRG_HNt4AjzDp1PJLQJ5P/exec";

fetch(url + "?user=" + user + "&pass=" + pass)
.then(res => res.text())
.then(data => {

if(data.trim() === "success"){

localStorage.setItem("customerLoggedIn","true");
window.location.href = "customer-dashboard.html";

}else{

document.getElementById("error").innerText =
"Wrong ID or Password";

}

})
.catch(err => {
document.getElementById("error").innerText =
"Server Error";
});

}

</script>

</body>
</html>
