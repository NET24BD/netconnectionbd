<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8"/>
<meta name="viewport" content="width=device-width, initial-scale=1.0"/>
<title>Login — MyShop</title>
<link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700&family=Playfair+Display:wght@700&display=swap" rel="stylesheet"/>
<style>
*,*::before,*::after{box-sizing:border-box;margin:0;padding:0}
:root{
  --bg:#04080f;
  --bg2:#070d1a;
  --panel:rgba(6,14,30,0.85);
  --border:rgba(30,100,255,0.18);
  --blue:#1e64ff;
  --blue2:#4d8aff;
  --blue3:#0a2a6e;
  --black:#04080f;
  --text:#e4eeff;
  --muted:#4a6080;
  --input-bg:rgba(10,25,60,0.6);
  --green:#22d98a;
  --red:#ff4f6a;
}
body{
  font-family:'Inter',sans-serif;
  background:var(--bg);
  color:var(--text);
  min-height:100vh;
  display:flex;align-items:center;justify-content:center;
  overflow:hidden;position:relative;
}
 
/* ── Background Scene Canvas ── */
#scene{position:fixed;inset:0;z-index:0;pointer-events:none;}
 
/* ── Topbar ── */
.topbar{
  position:fixed;top:0;left:0;right:0;z-index:20;
  display:flex;justify-content:space-between;align-items:center;
  padding:13px 28px;
  background:rgba(4,8,15,0.75);
  backdrop-filter:blur(14px);
  border-bottom:1px solid rgba(30,100,255,0.12);
}
.topbar-brand{
  font-family:'Playfair Display',serif;
  font-size:16px;color:var(--blue2);letter-spacing:0.5px;
}
.live-clock{font-size:12.5px;color:var(--muted);display:flex;align-items:center;gap:8px;}
.live-dot{width:6px;height:6px;border-radius:50%;background:var(--green);animation:pdot 1.8s ease-in-out infinite;}
@keyframes pdot{0%,100%{opacity:1;transform:scale(1)}50%{opacity:0.3;transform:scale(0.6)}}
 
/* ── Card ── */
.card{
  position:relative;z-index:2;width:420px;
  background:var(--panel);
  border:1px solid var(--border);
  border-radius:20px;
  padding:48px 44px 42px;
  backdrop-filter:blur(20px);
  box-shadow:0 0 0 1px rgba(30,100,255,0.08),0 30px 80px rgba(0,0,10,0.7),0 0 60px rgba(30,100,255,0.06);
  animation:slideUp 0.6s cubic-bezier(0.22,1,0.36,1) both;
}
@keyframes slideUp{from{opacity:0;transform:translateY(30px)}to{opacity:1;transform:translateY(0)}}
.card::before{
  content:'';position:absolute;inset:-1px;border-radius:21px;
  background:linear-gradient(135deg,rgba(30,100,255,0.3),transparent 50%,rgba(77,138,255,0.1));
  opacity:0;transition:opacity 0.4s;z-index:-1;pointer-events:none;
}
.card:hover::before{opacity:1}
 
/* Logo */
.logo-ring{
  width:52px;height:52px;border-radius:50%;
  background:linear-gradient(135deg,var(--blue),var(--blue2));
  display:flex;align-items:center;justify-content:center;
  margin-bottom:24px;
  box-shadow:0 0 30px rgba(30,100,255,0.4);
  animation:logoPop 0.7s cubic-bezier(0.34,1.56,0.64,1) 0.2s both;
}
@keyframes logoPop{from{transform:scale(0.4) rotate(-20deg);opacity:0}to{transform:scale(1);opacity:1}}
.logo-ring svg{width:22px;height:22px;fill:#fff;}
 
h1{
  font-family:'Playfair Display',serif;
  font-size:25px;color:var(--text);margin-bottom:5px;
}
.subtitle{
  font-size:13px;color:var(--muted);margin-bottom:32px;
  min-height:18px;
}
.cursor{
  display:inline-block;width:2px;height:12px;
  background:var(--blue2);margin-left:1px;vertical-align:middle;
  animation:blink 0.85s step-end infinite;
}
@keyframes blink{0%,100%{opacity:1}50%{opacity:0}}
 
/* Fields */
.field{margin-bottom:16px;}
label{
  display:block;font-size:11px;font-weight:600;
  text-transform:uppercase;letter-spacing:1px;
  color:var(--muted);margin-bottom:6px;
  transition:color 0.2s;
}
.field:focus-within label{color:var(--blue2);}
.input-wrap{position:relative;display:flex;align-items:center;}
.icon-left{
  position:absolute;left:13px;width:15px;height:15px;
  stroke:var(--muted);fill:none;stroke-width:1.8;
  pointer-events:none;transition:stroke 0.2s;z-index:1;
}
.field:focus-within .icon-left{stroke:var(--blue2);}
input[type=text],input[type=password]{
  width:100%;
  background:var(--input-bg);
  border:1px solid rgba(30,100,255,0.15);
  border-radius:10px;
  padding:12px 40px 12px 40px;
  font-family:'Inter',sans-serif;font-size:14px;color:var(--text);
  outline:none;
  transition:border-color 0.25s,box-shadow 0.25s,background 0.25s;
}
input::placeholder{color:rgba(74,96,128,0.5);}
input:focus{
  border-color:var(--blue);
  background:rgba(30,100,255,0.06);
  box-shadow:0 0 0 3px rgba(30,100,255,0.12);
}
input.vi{border-color:rgba(34,217,138,0.45);}
input.vx{border-color:rgba(255,79,106,0.55);box-shadow:0 0 0 3px rgba(255,79,106,0.1);}
 
.eye-btn{
  position:absolute;right:11px;
  background:none;border:none;cursor:pointer;
  padding:4px;opacity:0.4;transition:opacity 0.2s;
  display:flex;align-items:center;
}
.eye-btn:hover{opacity:0.85;}
.eye-btn svg{width:15px;height:15px;stroke:var(--text);fill:none;stroke-width:1.8;}
 
.hint{font-size:11px;margin-top:4px;min-height:15px;padding-left:2px;transition:color 0.2s;}
.hint.ok{color:var(--green);}
.hint.err{color:var(--red);}
 
/* Strength */
.sbar-wrap{display:none;margin-top:6px;gap:4px;align-items:center;flex-wrap:nowrap;}
.sbar-wrap.show{display:flex;}
.sbar{height:3px;flex:1;border-radius:99px;background:rgba(255,255,255,0.05);overflow:hidden;}
.sbar .f{height:100%;width:0%;border-radius:99px;transition:width 0.35s,background 0.35s;}
.slabel{font-size:10px;color:var(--muted);min-width:44px;text-align:right;}
 
/* Remember row */
.row{display:flex;justify-content:space-between;align-items:center;margin:6px 0 22px;}
.remember{display:flex;align-items:center;gap:8px;font-size:13px;color:var(--muted);cursor:pointer;user-select:none;}
.remember input[type=checkbox]{width:14px;height:14px;padding:0;accent-color:var(--blue);}
 
/* Button */
.btn{
  width:100%;padding:13.5px;
  background:linear-gradient(135deg,var(--blue),var(--blue2));
  border:none;border-radius:10px;
  font-family:'Inter',sans-serif;font-size:14.5px;font-weight:600;
  color:#fff;cursor:pointer;letter-spacing:0.3px;
  box-shadow:0 4px 22px rgba(30,100,255,0.35);
  transition:transform 0.15s,box-shadow 0.25s;
  position:relative;overflow:hidden;
}
.btn::after{content:'';position:absolute;inset:0;background:rgba(255,255,255,0.1);opacity:0;transition:opacity 0.2s;}
.btn:hover{transform:translateY(-1.5px);box-shadow:0 8px 30px rgba(30,100,255,0.5);}
.btn:hover::after{opacity:1;}
.btn:active{transform:translateY(0);}
.btn:disabled{opacity:0.5;cursor:not-allowed;transform:none;}
.ripple{position:absolute;border-radius:50%;background:rgba(255,255,255,0.3);transform:scale(0);animation:rip 0.55s linear;pointer-events:none;}
@keyframes rip{to{transform:scale(4);opacity:0;}}
 
.footer-note{text-align:center;margin-top:14px;font-size:11.5px;color:rgba(74,96,128,0.6);}
 
/* ── Page Loading Screen (initial) ── */
#loading-screen{
  position:fixed;inset:0;z-index:999;background:var(--bg);
  display:flex;flex-direction:column;align-items:center;justify-content:center;gap:24px;
  transition:opacity 0.7s,visibility 0.7s;
}
#loading-screen.hidden{opacity:0;visibility:hidden;pointer-events:none;}
.ld-logo{
  width:64px;height:64px;border-radius:50%;
  background:linear-gradient(135deg,var(--blue),var(--blue2));
  display:flex;align-items:center;justify-content:center;
  box-shadow:0 0 40px rgba(30,100,255,0.4);
  animation:ldPulse 1.5s ease-in-out infinite;
}
.ld-logo svg{width:28px;height:28px;fill:#fff;}
@keyframes ldPulse{0%,100%{transform:scale(1);box-shadow:0 0 40px rgba(30,100,255,0.4)}50%{transform:scale(1.1);box-shadow:0 0 70px rgba(30,100,255,0.6)}}
.ld-bar-wrap{width:180px;height:3px;background:rgba(255,255,255,0.06);border-radius:99px;overflow:hidden;}
.ld-bar{height:100%;width:0%;background:linear-gradient(90deg,var(--blue),var(--blue2));border-radius:99px;animation:ldFill 2s cubic-bezier(0.4,0,0.2,1) forwards;}
@keyframes ldFill{to{width:100%;}}
.ld-dots span{
  display:inline-block;width:7px;height:7px;border-radius:50%;
  background:var(--blue2);margin:0 4px;
  animation:dotB 1.1s ease-in-out infinite;
}
.ld-dots span:nth-child(2){animation-delay:.18s}
.ld-dots span:nth-child(3){animation-delay:.36s}
@keyframes dotB{0%,100%{transform:translateY(0);opacity:0.3}50%{transform:translateY(-9px);opacity:1}}
.ld-text{font-size:11px;color:var(--muted);letter-spacing:2px;text-transform:uppercase;}
 
/* ── Login Success / Connecting Screen ── */
#conn-screen{
  position:fixed;inset:0;z-index:1000;background:var(--bg);
  display:flex;flex-direction:column;align-items:center;justify-content:center;gap:32px;
  opacity:0;visibility:hidden;pointer-events:none;
  transition:opacity 0.5s,visibility 0.5s;
}
#conn-screen.show{opacity:1;visibility:visible;pointer-events:all;}
 
.conn-visual{position:relative;width:160px;height:160px;display:flex;align-items:center;justify-content:center;}
 
/* Rotating orbit rings */
.orbit{
  position:absolute;border-radius:50%;border:1.5px solid rgba(30,100,255,0.25);
  animation:spin linear infinite;
}
.orbit1{width:100%;height:100%;animation-duration:4s;}
.orbit2{width:72%;height:72%;animation-duration:3s;animation-direction:reverse;border-color:rgba(77,138,255,0.2);}
.orbit3{width:44%;height:44%;animation-duration:2s;border-color:rgba(30,100,255,0.35);}
@keyframes spin{to{transform:rotate(360deg)}}
 
/* Orbit dots */
.orbit::after{
  content:'';position:absolute;top:-4px;left:50%;transform:translateX(-50%);
  width:8px;height:8px;border-radius:50%;
  background:var(--blue2);
  box-shadow:0 0 10px var(--blue2);
}
 
/* Center icon */
.conn-center{
  position:relative;z-index:2;
  width:56px;height:56px;border-radius:50%;
  background:linear-gradient(135deg,var(--blue),var(--blue2));
  display:flex;align-items:center;justify-content:center;
  box-shadow:0 0 30px rgba(30,100,255,0.6);
  animation:centerPulse 1.4s ease-in-out infinite;
}
.conn-center svg{width:26px;height:26px;fill:#fff;}
@keyframes centerPulse{0%,100%{box-shadow:0 0 30px rgba(30,100,255,0.5)}50%{box-shadow:0 0 55px rgba(30,100,255,0.8)}}
 
/* Scan line */
.scan-line{
  position:absolute;width:100%;height:1.5px;
  background:linear-gradient(90deg,transparent,var(--blue),transparent);
  top:50%;animation:scan 2s ease-in-out infinite;
  box-shadow:0 0 8px var(--blue);
}
@keyframes scan{
  0%{transform:translateY(-68px);opacity:0}
  20%{opacity:1}
  80%{opacity:1}
  100%{transform:translateY(68px);opacity:0}
}
 
/* Picture row */
.conn-pics{display:flex;gap:14px;align-items:center;}
.conn-pic{
  width:52px;height:52px;border-radius:12px;
  border:1.5px solid rgba(30,100,255,0.25);
  display:flex;align-items:center;justify-content:center;
  font-size:24px;
  background:rgba(10,25,60,0.5);
  opacity:0;transform:translateY(12px);
  animation:picIn 0.4s ease forwards;
  box-shadow:0 0 16px rgba(30,100,255,0.15);
}
.conn-pic:nth-child(1){animation-delay:0.3s}
.conn-pic:nth-child(2){animation-delay:0.5s}
.conn-pic:nth-child(3){animation-delay:0.7s}
.conn-pic:nth-child(4){animation-delay:0.9s}
.conn-pic:nth-child(5){animation-delay:1.1s}
@keyframes picIn{to{opacity:1;transform:translateY(0)}}
 
/* Text block */
.conn-title{
  font-family:'Playfair Display',serif;
  font-size:26px;color:var(--text);letter-spacing:-0.3px;
  opacity:0;animation:fadeUp 0.5s ease 0.2s forwards;
}
.conn-user{color:var(--blue2);font-style:italic;}
.conn-sub{
  font-size:13px;color:var(--muted);
  opacity:0;animation:fadeUp 0.5s ease 0.4s forwards;
  display:flex;align-items:center;gap:8px;
}
.conn-sub .typed-text{min-width:180px;}
 
@keyframes fadeUp{to{opacity:1;transform:none}}
 
/* Progress bar */
.conn-bar-wrap{
  width:260px;height:3px;background:rgba(255,255,255,0.06);
  border-radius:99px;overflow:hidden;
  opacity:0;animation:fadeUp 0.5s ease 0.5s forwards;
}
.conn-bar{
  height:100%;width:0%;
  background:linear-gradient(90deg,var(--blue),var(--blue2));
  border-radius:99px;
  box-shadow:0 0 8px var(--blue);
}
.conn-bar.run{animation:barFill 3s cubic-bezier(0.4,0,0.2,1) 0.6s forwards;}
@keyframes barFill{to{width:100%;}}
 
/* Status chips */
.conn-chips{
  display:flex;gap:10px;
  opacity:0;animation:fadeUp 0.5s ease 0.7s forwards;
}
.chip{
  font-size:11px;padding:5px 12px;
  border-radius:99px;
  border:1px solid rgba(30,100,255,0.25);
  color:var(--muted);letter-spacing:0.5px;
  display:flex;align-items:center;gap:5px;
}
.chip-dot{width:5px;height:5px;border-radius:50%;background:var(--green);animation:pdot 1.8s ease-in-out infinite;}
 
/* ── Animated Background Scene ── */
@media(max-width:480px){.card{width:92vw;padding:36px 22px 32px;}}
</style>
</head>
<body>
 
<!-- Page load screen -->
<div id="loading-screen">
  <div class="ld-logo">
    <svg viewBox="0 0 24 24"><path d="M12 2C6.48 2 2 6.48 2 12s4.48 10 10 10 10-4.48 10-10S17.52 2 12 2zm0 3c1.66 0 3 1.34 3 3s-1.34 3-3 3-3-1.34-3-3 1.34-3 3-3zm0 14.2c-2.5 0-4.71-1.28-6-3.22.03-1.99 4-3.08 6-3.08 1.99 0 5.97 1.09 6 3.08-1.29 1.94-3.5 3.22-6 3.22z"/></svg>
  </div>
  <div class="ld-dots"><span></span><span></span><span></span></div>
  <div class="ld-bar-wrap"><div class="ld-bar"></div></div>
  <div class="ld-text">Loading...</div>
</div>
 
<!-- Connecting / success screen -->
<div id="conn-screen">
  <div class="conn-visual">
    <div class="orbit orbit1"></div>
    <div class="orbit orbit2"></div>
    <div class="orbit orbit3"></div>
    <div class="scan-line"></div>
    <div class="conn-center">
      <svg viewBox="0 0 24 24"><path d="M1 6l11 7L23 6M2 4h20a1 1 0 011 1v14a1 1 0 01-1 1H2a1 1 0 01-1-1V5a1 1 0 011-1z" stroke="#fff" stroke-width="1.8" fill="none" stroke-linecap="round"/></svg>
    </div>
  </div>
 
  <div class="conn-pics" id="conn-pics">
    <div class="conn-pic">🌿</div>
    <div class="conn-pic">🐱</div>
    <div class="conn-pic">✨</div>
    <div class="conn-pic">🔐</div>
    <div class="conn-pic">🚀</div>
  </div>
 
  <div style="text-align:center">
    <div class="conn-title">Welcome back, <span class="conn-user" id="conn-user">User</span>!</div>
  </div>
  <div class="conn-sub">
    <span class="conn-sub">
      <span id="conn-typed"></span><span class="cursor"></span>
    </span>
  </div>
 
  <div class="conn-bar-wrap">
    <div class="conn-bar" id="conn-bar"></div>
  </div>
 
  <div class="conn-chips">
    <div class="chip"><div class="chip-dot"></div> Secure</div>
    <div class="chip"><div class="chip-dot"></div> Verified</div>
    <div class="chip"><div class="chip-dot"></div> Connected</div>
  </div>
</div>
 
<!-- Background canvas -->
<canvas id="scene"></canvas>
 
<!-- Topbar -->
<div class="topbar">
  <span class="topbar-brand">MyShop</span>
  <div class="live-clock">
    <div class="live-dot"></div>
    <span id="clock">--:--:--</span>
    <span id="datestr" style="color:rgba(74,96,128,0.7);margin-left:4px"></span>
  </div>
</div>
 
<!-- Login card -->
<div class="card">
  <div class="logo-ring">
    <svg viewBox="0 0 24 24"><path d="M12 2C6.48 2 2 6.48 2 12s4.48 10 10 10 10-4.48 10-10S17.52 2 12 2zm0 3c1.66 0 3 1.34 3 3s-1.34 3-3 3-3-1.34-3-3 1.34-3 3-3zm0 14.2c-2.5 0-4.71-1.28-6-3.22.03-1.99 4-3.08 6-3.08 1.99 0 5.97 1.09 6 3.08-1.29 1.94-3.5 3.22-6 3.22z"/></svg>
  </div>
 
  <h1>Welcome Back</h1>
  <p class="subtitle" id="subtitle"><span class="cursor"></span></p>
 
  <!-- Username -->
  <div class="field">
    <label for="username">Username</label>
    <div class="input-wrap">
      <svg class="icon-left" viewBox="0 0 24 24"><circle cx="12" cy="8" r="4"/><path d="M4 20c0-4 3.6-7 8-7s8 3 8 7"/></svg>
      <input type="text" id="username" placeholder="Enter your username" autocomplete="username" oninput="validateUser()"/>
    </div>
    <div class="hint" id="u-hint"></div>
  </div>
 
  <!-- Password -->
  <div class="field">
    <label for="password">Password</label>
    <div class="input-wrap">
      <svg class="icon-left" viewBox="0 0 24 24"><rect x="3" y="11" width="18" height="11" rx="2"/><path d="M7 11V7a5 5 0 0110 0v4"/></svg>
      <input type="password" id="password" placeholder="••••••••" autocomplete="current-password" oninput="validatePass()"/>
      <button class="eye-btn" onclick="toggleEye()" type="button">
        <svg id="eye-svg" viewBox="0 0 24 24"><path d="M1 12S5 4 12 4s11 8 11 8-4 8-11 8S1 12 1 12z"/><circle cx="12" cy="12" r="3"/></svg>
      </button>
    </div>
    <div class="sbar-wrap" id="sbar-wrap">
      <div class="sbar"><div class="f" id="sb1"></div></div>
      <div class="sbar"><div class="f" id="sb2"></div></div>
      <div class="sbar"><div class="f" id="sb3"></div></div>
      <div class="sbar"><div class="f" id="sb4"></div></div>
      <span class="slabel" id="slabel"></span>
    </div>
    <div class="hint" id="p-hint"></div>
  </div>
 
  <div class="row">
    <label class="remember">
      <input type="checkbox" id="remember"/> Remember me
    </label>
  </div>
 
  <button class="btn" id="login-btn" onclick="handleLogin(event)">Sign In</button>
  <p class="footer-note" id="attempt-note"></p>
</div>
 
<script>
/* ─── Google Sheets API ─── */
const SHEET_API = "https://script.google.com/macros/s/AKfycbyvOzBF0NhMDksSyLuU5iV9kUjNyN59LMY3umBUfjyfCAUgRG_HNt4AjzDp1PJLQJ5P/exec";
 
/* ─── Page load hide ─── */
setTimeout(() => document.getElementById('loading-screen').classList.add('hidden'), 2200);
 
/* ─── Live Clock ─── */
function tick() {
  const n = new Date();
  const pad = x => String(x).padStart(2,'0');
  document.getElementById('clock').textContent = `${pad(n.getHours())}:${pad(n.getMinutes())}:${pad(n.getSeconds())}`;
  const days = ['Sunday','Monday','Tuesday','Wednesday','Thursday','Friday','Saturday'];
  document.getElementById('datestr').textContent = days[n.getDay()];
}
tick(); setInterval(tick, 1000);
 
/* ─── Typing subtitle ─── */
const msgs = ['Sign in to your account','Good to see you again ✦','Your dashboard awaits'];
let mi=0,ci=0,del=false;
const subEl = document.getElementById('subtitle');
function typeIt(){
  const m=msgs[mi];
  if(!del){ ci++;
    subEl.innerHTML = m.slice(0,ci)+'<span class="cursor"></span>';
    if(ci===m.length){del=true;setTimeout(typeIt,2000);return;}
    setTimeout(typeIt,55);
  } else { ci--;
    subEl.innerHTML = m.slice(0,ci)+'<span class="cursor"></span>';
    if(ci===0){del=false;mi=(mi+1)%msgs.length;setTimeout(typeIt,350);return;}
    setTimeout(typeIt,28);
  }
}
typeIt();
 
/* ─── Animated Background Scene (Cat + Tree + Stars) ─── */
const canvas = document.getElementById('scene');
const ctx = canvas.getContext('2d');
let W, H;
function resz(){ W=canvas.width=window.innerWidth; H=canvas.height=window.innerHeight; }
resz(); window.addEventListener('resize', resz);
 
// Stars
const stars = Array.from({length:80},()=>({
  x:Math.random()*1400, y:Math.random()*900,
  r:Math.random()*1.2+0.2, o:Math.random()*0.5+0.1,
  sp:Math.random()*0.2+0.05
}));
 
// Cat state
let catX = -80, catY = 0;
let catWalk = 0, catBlink = 0, catDir = 1;
let catState = 'walk'; // walk | sit | stretch
 
// Tree sway
let treeAngle = 0;
 
function drawTree(x, y, size, angle) {
  ctx.save();
  ctx.translate(x, y);
  // Trunk
  ctx.strokeStyle = 'rgba(20,60,140,0.6)';
  ctx.lineWidth = size * 0.07;
  ctx.beginPath(); ctx.moveTo(0,0); ctx.lineTo(0,-size*0.45); ctx.stroke();
  // Branches with sway
  ctx.save(); ctx.translate(0,-size*0.45);
  const sw = Math.sin(angle)*0.06;
  // Left branch
  ctx.save(); ctx.rotate(-0.5+sw);
  ctx.strokeStyle='rgba(20,60,140,0.45)'; ctx.lineWidth=size*0.04;
  ctx.beginPath(); ctx.moveTo(0,0); ctx.lineTo(-size*0.25,-size*0.2); ctx.stroke();
  ctx.restore();
  // Right branch
  ctx.save(); ctx.rotate(0.45+sw);
  ctx.strokeStyle='rgba(20,60,140,0.45)'; ctx.lineWidth=size*0.04;
  ctx.beginPath(); ctx.moveTo(0,0); ctx.lineTo(size*0.25,-size*0.2); ctx.stroke();
  ctx.restore();
  ctx.restore();
  // Foliage (3 circles)
  const grd = ctx.createRadialGradient(0,-size*0.7,0,0,-size*0.7,size*0.38);
  grd.addColorStop(0,'rgba(30,100,255,0.18)');
  grd.addColorStop(1,'rgba(10,30,80,0.0)');
  ctx.fillStyle = grd;
  ctx.beginPath(); ctx.arc(0,-size*0.7,size*0.38,0,Math.PI*2); ctx.fill();
  ctx.beginPath(); ctx.arc(-size*0.22,-size*0.58,size*0.26,0,Math.PI*2); ctx.fill();
  ctx.beginPath(); ctx.arc(size*0.22,-size*0.58,size*0.26,0,Math.PI*2); ctx.fill();
  ctx.restore();
}
 
function drawCat(x, y, frame, blink, dir, state) {
  ctx.save();
  ctx.translate(x, y);
  if(dir < 0) { ctx.scale(-1,1); }
 
  const blue = 'rgba(50,120,255,0.75)';
  const blue2 = 'rgba(100,160,255,0.85)';
  const dark = 'rgba(20,60,140,0.9)';
 
  // Shadow
  ctx.ellipse && (() => {
    ctx.beginPath();
    ctx.ellipse(0,2,18,4,0,0,Math.PI*2);
    ctx.fillStyle='rgba(0,10,40,0.35)'; ctx.fill();
  })();
 
  // Tail
  if(state === 'sit') {
    ctx.beginPath();
    ctx.moveTo(12,0); ctx.quadraticCurveTo(26,-8,22,-18+Math.sin(frame*0.08)*4);
    ctx.strokeStyle=blue; ctx.lineWidth=3; ctx.stroke();
  } else {
    const tw = Math.sin(frame*0.12)*12;
    ctx.beginPath();
    ctx.moveTo(10,0); ctx.quadraticCurveTo(20+tw,-10,18,-22);
    ctx.strokeStyle=blue; ctx.lineWidth=3; ctx.stroke();
  }
 
  // Body
  ctx.beginPath(); ctx.ellipse(0,-8,13,10,0,0,Math.PI*2);
  ctx.fillStyle=blue; ctx.fill();
  ctx.strokeStyle=dark; ctx.lineWidth=1; ctx.stroke();
 
  // Legs (walk anim)
  if(state === 'walk') {
    const la = Math.sin(frame*0.2)*10;
    [[(-7),la],[7,-la]].forEach(([ox,angle])=>{
      ctx.save(); ctx.translate(ox,0); ctx.rotate(angle*Math.PI/180);
      ctx.beginPath(); ctx.moveTo(0,0); ctx.lineTo(0,10);
      ctx.strokeStyle=blue; ctx.lineWidth=3.5; ctx.stroke();
      ctx.beginPath(); ctx.arc(0,10,2.5,0,Math.PI*2);
      ctx.fillStyle=dark; ctx.fill();
      ctx.restore();
    });
  } else if(state === 'sit') {
    // Folded paws
    ctx.beginPath(); ctx.ellipse(-5,2,5,3,0.2,0,Math.PI*2);
    ctx.fillStyle=blue2; ctx.fill();
    ctx.beginPath(); ctx.ellipse(5,2,5,3,-0.2,0,Math.PI*2);
    ctx.fillStyle=blue2; ctx.fill();
  }
 
  // Head
  ctx.beginPath(); ctx.arc(0,-19,11,0,Math.PI*2);
  ctx.fillStyle=blue2; ctx.fill();
  ctx.strokeStyle=dark; ctx.lineWidth=1; ctx.stroke();
 
  // Ears
  [[-8,-28],[8,-28]].forEach(([ex,ey],i)=>{
    ctx.beginPath();
    ctx.moveTo(i===0?-3:-10+16,-21);
    ctx.lineTo(ex,ey);
    ctx.lineTo(i===0?-10+5:-10+13,-21);
    ctx.fillStyle=blue; ctx.fill();
    ctx.strokeStyle=dark; ctx.lineWidth=1; ctx.stroke();
    // inner ear
    ctx.beginPath();
    ctx.moveTo(i===0?-4:-10+17,-22);
    ctx.lineTo(ex+( i===0?1:-1),ey+3);
    ctx.lineTo(i===0?-10+6:-10+14,-22);
    ctx.fillStyle='rgba(100,160,255,0.35)'; ctx.fill();
  });
 
  // Eyes
  if(blink < 3) {
    [[-4,-19],[4,-19]].forEach(([ex,ey])=>{
      ctx.beginPath(); ctx.arc(ex,ey,2.5,0,Math.PI*2);
      ctx.fillStyle='rgba(200,230,255,0.95)'; ctx.fill();
      ctx.beginPath(); ctx.arc(ex+0.5,ey,1.2,0,Math.PI*2);
      ctx.fillStyle=dark; ctx.fill();
    });
  } else {
    [[-4,-19],[4,-19]].forEach(([ex,ey])=>{
      ctx.beginPath(); ctx.moveTo(ex-2.5,ey); ctx.lineTo(ex+2.5,ey);
      ctx.strokeStyle='rgba(200,230,255,0.7)'; ctx.lineWidth=1.2; ctx.stroke();
    });
  }
 
  // Nose
  ctx.beginPath(); ctx.moveTo(-1,-17); ctx.lineTo(1,-17); ctx.lineTo(0,-15.5); ctx.closePath();
  ctx.fillStyle='rgba(180,100,255,0.7)'; ctx.fill();
 
  // Whiskers
  [[-1],[ 1]].forEach(side=>{
    for(let i=0;i<3;i++){
      ctx.beginPath();
      const wy = -17+i*1.5;
      ctx.moveTo(side[0]*1, wy);
      ctx.lineTo(side[0]*12, wy-1+i*0.5);
      ctx.strokeStyle='rgba(150,200,255,0.4)'; ctx.lineWidth=0.8; ctx.stroke();
    }
  });
 
  ctx.restore();
}
 
let frame = 0, sitTimer = 0;
function drawScene() {
  ctx.clearRect(0,0,W,H);
 
  // Stars
  stars.forEach(s=>{
    ctx.beginPath(); ctx.arc(s.x % W, s.y % H, s.r,0,Math.PI*2);
    ctx.fillStyle=`rgba(100,160,255,${s.o + Math.sin(frame*s.sp)*0.15})`;
    ctx.fill();
  });
 
  // Grid lines (subtle)
  ctx.strokeStyle='rgba(30,100,255,0.03)';
  ctx.lineWidth=1;
  for(let gx=0;gx<W;gx+=80){ ctx.beginPath(); ctx.moveTo(gx,0); ctx.lineTo(gx,H); ctx.stroke(); }
  for(let gy=0;gy<H;gy+=80){ ctx.beginPath(); ctx.moveTo(0,gy); ctx.lineTo(W,gy); ctx.stroke(); }
 
  // Ground line
  const ground = H - 60;
  ctx.strokeStyle='rgba(30,100,255,0.12)';
  ctx.lineWidth=1;
  ctx.beginPath(); ctx.moveTo(0,ground); ctx.lineTo(W,ground); ctx.stroke();
 
  // Trees
  treeAngle += 0.015;
  const trees = [
    {x: W*0.08, s: 130},
    {x: W*0.18, s: 90},
    {x: W*0.82, s: 115},
    {x: W*0.91, s: 80},
    {x: W*0.55, s: 70},
  ];
  trees.forEach(t => drawTree(t.x, ground, t.s, treeAngle));
 
  // Cat walk
  frame++;
  catWalk++;
  catBlink = (catBlink + 1) % 90;
 
  if(catState === 'walk'){
    catX += catDir * 1.2;
    catY = ground;
    if(catX > W + 80) { catX = -80; }
    if(catX > W * 0.3 && catX < W * 0.4 && catDir===1 && Math.random()<0.005){
      catState='sit'; sitTimer=0;
    }
  } else if(catState === 'sit'){
    sitTimer++;
    if(sitTimer > 220) { catState='walk'; }
  }
 
  drawCat(catX, catY, catWalk, catBlink > 82 ? catBlink - 82 : 0, catDir, catState);
 
  // Floating particles
  stars.forEach((s,i)=>{
    s.y -= s.sp * 0.3;
    if(s.y < -5){ s.y = H + 5; s.x = Math.random() * W; }
  });
 
  requestAnimationFrame(drawScene);
}
drawScene();
 
/* ─── Validation ─── */
function validateUser(){
  const el=document.getElementById('username'), h=document.getElementById('u-hint'), v=el.value.trim();
  el.classList.remove('vi','vx');
  if(!v){h.textContent='';h.className='hint';return false;}
  if(v.length<3){el.classList.add('vx');h.textContent='✗ Minimum 3 characters';h.className='hint err';return false;}
  if(/\s/.test(v)){el.classList.add('vx');h.textContent='✗ No spaces allowed';h.className='hint err';return false;}
  el.classList.add('vi');h.textContent='✓ Username looks good';h.className='hint ok';return true;
}
 
function validatePass(){
  const el=document.getElementById('password'),h=document.getElementById('p-hint');
  const sw=document.getElementById('sbar-wrap');
  const sl=document.getElementById('slabel');
  const bars=[document.getElementById('sb1'),document.getElementById('sb2'),document.getElementById('sb3'),document.getElementById('sb4')];
  const v=el.value;
  el.classList.remove('vi','vx');
  if(!v){sw.classList.remove('show');h.textContent='';h.className='hint';return false;}
  sw.classList.add('show');
  let score=0;
  if(v.length>=6)score++;if(v.length>=10)score++;
  if(/[A-Z]/.test(v)&&/[0-9]/.test(v))score++;
  if(/[^A-Za-z0-9]/.test(v))score++;
  const cols=['#ff4f6a','#ff9a3c','#1e64ff','#22d98a'];
  const lvls=['Weak','Fair','Good','Strong'];
  bars.forEach((b,i)=>{b.style.width=i<score?'100%':'0%';b.style.background=i<score?cols[score-1]:'transparent';});
  sl.textContent=score>0?lvls[score-1]:'';sl.style.color=score>0?cols[score-1]:'';
  if(v.length<6){el.classList.add('vx');h.textContent='✗ Minimum 6 characters';h.className='hint err';return false;}
  el.classList.add('vi');h.textContent='✓ Password accepted';h.className='hint ok';return true;
}
 
function toggleEye(){
  const inp=document.getElementById('password');
  const vis=inp.type==='password';
  inp.type=vis?'text':'password';
  document.getElementById('eye-svg').innerHTML=vis
    ?'<path d="M17.94 17.94A10.07 10.07 0 0112 20c-7 0-11-8-11-8a18.45 18.45 0 015.06-5.94M9.9 4.24A9.12 9.12 0 0112 4c7 0 11 8 11 8a18.5 18.5 0 01-2.16 3.19M1 1l22 22" stroke="currentColor" stroke-width="1.8" fill="none" stroke-linecap="round"/>'
    :'<path d="M1 12S5 4 12 4s11 8 11 8-4 8-11 8S1 12 1 12z"/><circle cx="12" cy="12" r="3"/>';
}
 
/* ─── Ripple ─── */
document.getElementById('login-btn').addEventListener('click',function(e){
  const r=document.createElement('span');r.className='ripple';
  const rect=this.getBoundingClientRect();
  const size=Math.max(rect.width,rect.height);
  r.style.cssText=`width:${size}px;height:${size}px;left:${e.clientX-rect.left-size/2}px;top:${e.clientY-rect.top-size/2}px`;
  this.appendChild(r);setTimeout(()=>r.remove(),600);
});
 
/* ─── Login Handler ─── */
let attempts = 0;
function handleLogin(e){
  const uOk=validateUser(), pOk=validatePass();
  const btn=document.getElementById('login-btn');
  const note=document.getElementById('attempt-note');
  if(!uOk||!pOk){
    attempts++;
    if(attempts>=2) note.textContent=`${attempts} failed attempt${attempts>1?'s':''} — check your details.`;
    btn.style.animation='shake 0.4s';
    setTimeout(()=>btn.style.animation='',400);
    return;
  }
  const uname=document.getElementById('username').value.trim();
  const pword=document.getElementById('password').value;
 
  // Disable button, show checking state
  btn.disabled=true;
  btn.innerHTML='<span style="opacity:.7">Checking...</span>';
  note.textContent='';
 
  // Call Google Sheets API via JSONP (bypasses CORS)
  const cbName = 'gsCallback_' + Date.now();
  const url = `${SHEET_API}?username=${encodeURIComponent(uname)}&password=${encodeURIComponent(pword)}&callback=${cbName}`;
 
  // Timeout fallback
  const timer = setTimeout(()=>{
    cleanup();
    btn.disabled=false;
    btn.innerHTML='Sign In';
    note.textContent='⚠️ Connection timeout — please try again.';
  }, 8000);
 
  function cleanup(){ 
    delete window[cbName];
    const s=document.getElementById('gs-script');
    if(s) s.remove();
    clearTimeout(timer);
  }
 
  window[cbName] = function(data){
    cleanup();
    if(data && data.success===true){
      showConnecting(uname);
    } else {
      btn.disabled=false;
      btn.innerHTML='Sign In';
      attempts++;
      note.textContent='❌ Username or password is incorrect.';
      document.getElementById('username').classList.remove('vi');
      document.getElementById('username').classList.add('vx');
      document.getElementById('password').classList.remove('vi');
      document.getElementById('password').classList.add('vx');
      btn.style.animation='shake 0.4s';
      setTimeout(()=>btn.style.animation='',400);
    }
  };
 
  const script = document.createElement('script');
  script.id = 'gs-script';
  script.src = url;
  script.onerror = function(){
    cleanup();
    // fallback: try plain fetch
    fetch(`${SHEET_API}?username=${encodeURIComponent(uname)}&password=${encodeURIComponent(pword)}`)
      .then(r=>r.json())
      .then(data=>{
        if(data && data.success===true){
          showConnecting(uname);
        } else {
          btn.disabled=false; btn.innerHTML='Sign In';
          note.textContent='❌ Username or password is incorrect.';
        }
      })
      .catch(()=>{
        btn.disabled=false; btn.innerHTML='Sign In';
        note.textContent='⚠️ Connection error — check your internet.';
      });
  };
  document.head.appendChild(script);
  return; // stop old code below from running
  const match=false;
  if(!match){
    attempts++;
    note.textContent='❌ Username or password is incorrect.';
    document.getElementById('username').classList.replace('vi','vx');
    document.getElementById('password').classList.replace('vi','vx');
    btn.style.animation='shake 0.4s';
    setTimeout(()=>btn.style.animation='',400);
    return;
  }
  btn.disabled=true;
  btn.innerHTML='<span style="opacity:.7">Signing in...</span>';
  note.textContent='';
  setTimeout(()=>showConnecting(uname), 700);
}
 
/* ─── Connecting screen ─── */
const connMsgs=[
  'Establishing secure connection...',
  'Verifying your identity...',
  'Loading your dashboard...',
  'Almost there...'
];
function showConnecting(uname){
  document.getElementById('conn-user').textContent=uname;
  document.getElementById('conn-screen').classList.add('show');
  document.getElementById('conn-bar').classList.add('run');
  // Typed messages
  let mi=0, ci=0;
  const el=document.getElementById('conn-typed');
  function typeConn(){
    if(mi>=connMsgs.length) return;
    const m=connMsgs[mi];
    if(ci<=m.length){
      el.textContent=m.slice(0,ci); ci++;
      setTimeout(typeConn, 40);
    } else {
      mi++; ci=0;
      setTimeout(typeConn, 900);
    }
  }
  typeConn();

  setTimeout(() => {
    window.location.href = "customer-dashboard.html";
  }, 4000);
}
 
document.addEventListener('keydown',e=>{if(e.key==='Enter')handleLogin(e);});
 
/* Shake + star-fly keyframes */
const ks=document.createElement('style');
ks.textContent='@keyframes shake{0%,100%{transform:translateX(0)}20%{transform:translateX(-6px)}40%{transform:translateX(6px)}60%{transform:translateX(-4px)}80%{transform:translateX(4px)}}';
document.head.appendChild(ks);
</script>
