<!DOCTYPE html>
<html lang="en">

<head>
<meta charset="UTF-8">
<title>Admin Login</title>

<style>

body{
  margin:0;
  font-family:Poppins;
  background:#050816;
  display:flex;
  justify-content:center;
  align-items:center;
  height:100vh;
  color:white;
}

.box{
  background:#0b1228;
  padding:30px;
  border-radius:15px;
  width:320px;
  text-align:center;
  border:1px solid #00e5ff;
}

input{
  width:100%;
  padding:12px;
  margin:10px 0;
  border:none;
  border-radius:8px;
  outline:none;
}

button{
  width:100%;
  padding:12px;
  background:#00e5ff;
  border:none;
  font-weight:bold;
  cursor:pointer;
  border-radius:8px;
}

button:hover{
  background:#00c2d6;
}

#msg{
  color:red;
  margin-top:10px;
}

h2{
  color:#00e5ff;
}

</style>

</head>

<body>

<div class="box">

<h2>Admin Login</h2>

<input id="user" placeholder="Username">
<input id="pass" type="password" placeholder="Password">

<button onclick="login()">Login</button>

<p id="msg"></p>

</div>

<script>

function login(){

  let u = document.getElementById("user").value;
  let p = document.getElementById("pass").value;

  if(u === "admin" && p === "1234"){
    window.location.href = "admin-panel.html";
  }else{
    document.getElementById("msg").innerText = "❌ Wrong Username or Password";
  }

}

</script>

</body>
</html>
