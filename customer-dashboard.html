<!DOCTYPE html>
<html lang="en">

<head>
<meta charset="UTF-8" />
<meta name="viewport" content="width=device-width, initial-scale=1.0"/>
<title>NexonetX Dashboard</title>

<style>

*{
    margin:0;
    padding:0;
    box-sizing:border-box;
    font-family:Arial,sans-serif;
}

body{
    background:#081120;
    color:white;
    min-height:100vh;
    padding:30px;
}

/* TOP BAR */
.topbar{
    width:100%;
    background:#111c33;
    border:1px solid rgba(255,255,255,0.05);
    border-radius:18px;
    padding:20px;
    display:flex;
    justify-content:space-between;
    align-items:center;
    margin-bottom:30px;
}

.logo{
    font-size:26px;
    font-weight:bold;
    color:#4da3ff;
}

.user-box{
    display:flex;
    align-items:center;
    gap:15px;
}

.username{
    color:#dbeafe;
}

.logout-btn{
    background:#2563eb;
    border:none;
    padding:10px 16px;
    border-radius:10px;
    color:white;
    cursor:pointer;
    transition:0.3s;
}

.logout-btn:hover{
    background:#1d4ed8;
}

/* GRID */
.server-grid{
    display:grid;
    grid-template-columns:repeat(auto-fit,minmax(260px,1fr));
    gap:20px;
}

/* CARD */
.server-card{
    background:#111c33;
    border-radius:18px;
    padding:22px;
    text-decoration:none;
    color:white;
    border:1px solid rgba(255,255,255,0.05);
    transition:0.3s;
}

.server-card:hover{
    transform:translateY(-6px);
    border-color:#2563eb;
    box-shadow:0 0 20px rgba(37,99,235,0.3);
}

.server-name{
    font-size:20px;
    font-weight:bold;
    color:#4da3ff;
    margin-bottom:8px;
}

.server-info{
    font-size:14px;
    color:#dbeafe;
    margin-bottom:6px;
}

.status{
    display:inline-block;
    margin-top:10px;
    padding:5px 12px;
    border-radius:20px;
    font-size:12px;
    font-weight:bold;
}

.online{
    background:linear-gradient(135deg,#16a34a,#22c55e);
}

.offline{
    background:linear-gradient(135deg,#ff3b3b,#ff1f1f);
}

</style>
</head>

<body>

<!-- TOP BAR -->
<div class="topbar">

    <div class="logo">NexonetX</div>

    <div class="user-box">
        <div class="username">Welcome Customer</div>
        <button class="logout-btn" onclick="logout()">Logout</button>
    </div>

</div>

<!-- GRID -->
<div class="server-grid">

    <a href="http://new.circleftp.net/" target="_blank" class="server-card">
        <div class="server-name">Circle FTP</div>
        <div class="server-info">Unlimited Movies</div>
        <div class="status online">ONLINE</div>
    </a>

    <a href="https://ctgmovies.com/" target="_blank" class="server-card">
        <div class="server-name">CTG Movies</div>
        <div class="status online">ONLINE</div>
    </a>

    <a href="http://play.starplex.live/" target="_blank" class="server-card">
        <div class="server-name">Starplex</div>
        <div class="status online">ONLINE</div>
    </a>

    <a href="https://itcnbd.live/" target="_blank" class="server-card">
        <div class="server-name">Live TV</div>
        <div class="status online">ONLINE</div>
    </a>

    <a href="https://server2.ftpbd.net/" target="_blank" class="server-card">
        <div class="server-name">FTPBD</div>
        <div class="status online">ONLINE</div>
    </a>

    <a href="https://play.roarzone.net/web/index.html#!/home" target="_blank" class="server-card">
        <div class="server-name">Roarzone</div>
        <div class="status online">ONLINE</div>
    </a>

    <a href="#" class="server-card">
        <div class="server-name">FTP Server 4</div>
        <div class="status offline">OFFLINE</div>
    </a>

    <a href="#" class="server-card">
        <div class="server-name">FTP Server 5</div>
        <div class="status offline">OFFLINE</div>
    </a>

    <a href="#" class="server-card">
        <div class="server-name">FTP Server 6</div>
        <div class="status offline">OFFLINE</div>
    </a>

    <a href="#" class="server-card">
        <div class="server-name">FTP Server 7</div>
        <div class="status offline">OFFLINE</div>
    </a>

</div>

<!-- LOGOUT SCRIPT -->
<script>
function logout(){
    if(confirm("Are you sure you want to logout?")){
        localStorage.clear();
        sessionStorage.clear();
        window.location.href = "customer-login.html";
    }
}
</script>

</body>
</html>
