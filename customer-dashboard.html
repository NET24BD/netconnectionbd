<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Customer Dashboard</title>

<style>
body{
    margin:0;
    font-family:Arial;
    background:#0b1220;
    color:white;
}

.header{
    background:#2563eb;
    padding:15px;
    display:flex;
    justify-content:space-between;
}

.box{
    margin:20px;
    padding:15px;
    background:#111827;
    border-radius:10px;
}
button{
    background:red;
    color:white;
    border:none;
    padding:10px;
    border-radius:8px;
}
</style>
</head>

<body>

<div class="header">
<h3>Customer Panel</h3>
<button onclick="logout()">Logout</button>
</div>

<div class="box">
<h3>Welcome Customer</h3>
<p>Your account is active.</p>
</div>

<script>

if(localStorage.getItem("customerLoggedIn") !== "true"){
    window.location.href = "customer-login.html";
}

function logout(){
localStorage.removeItem("customerLoggedIn");
window.location.href = "customer-login.html";
}

</script>

</body>
</html>
