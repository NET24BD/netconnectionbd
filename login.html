<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Admin Login</title>

<style>
body{
    margin:0;
    height:100vh;
    display:flex;
    justify-content:center;
    align-items:center;
    background:linear-gradient(135deg,#000,#0f172a,#2563eb);
    font-family:Arial;
}

.box{
    width:280px;
    background:#0f172a;
    padding:25px;
    border-radius:15px;
    text-align:center;
    box-shadow:0 0 20px rgba(37,99,235,0.4);
}

h2{
    color:white;
    margin-bottom:20px;
}

input{
    width:100%;
    padding:12px;
    margin:8px 0;
    border:none;
    border-radius:8px;
    background:#1e293b;
    color:white;
    outline:none;
}

button{
    width:100%;
    padding:12px;
    border:none;
    border-radius:8px;
    background:#2563eb;
    color:white;
    font-size:15px;
    cursor:pointer;
}

button:hover{
    background:#1d4ed8;
}

#error{
    color:red;
    margin-top:10px;
    font-size:13px;
}

</style>
</head>

<body>

<div class="box">
    <h2>Admin Login</h2>

    <input type="text" id="username" placeholder="Username">
    <input type="password" id="password" placeholder="Password">

    <button onclick="login()">Login</button>

    <p id="error"></p>
</div>

<script>

function login(){

    let user = document.getElementById("username").value;
    let pass = document.getElementById("password").value;

    if(user === "LOGIN" && pass === "2988"){

        localStorage.setItem("adminLoggedIn","true");

        window.location.href = "admin.html";

    }else{

        document.getElementById("error").innerText =
        "Wrong Username or Password";
    }
}

</script>

</body>
</html>
